<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Knox Ventas</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 122'><defs><linearGradient id='p' x1='0%25' y1='0%25' x2='0%25' y2='100%25'><stop offset='0%25' stop-color='%231e40af'/><stop offset='100%25' stop-color='%231e3a8a'/></linearGradient><linearGradient id='k' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%2393c5fd'/><stop offset='100%25' stop-color='%233b82f6'/></linearGradient></defs><ellipse cx='50' cy='112' rx='17' ry='5.5' fill='rgba(59,130,246,0.22)'/><path d='M50 5 C25 5 10 22 10 41 C10 65 50 92 50 92 C50 92 90 65 90 41 C90 22 75 5 50 5 Z' fill='url(%23p)' stroke='%233b82f6' stroke-width='3.5'/><rect x='28' y='19' width='9' height='44' rx='2.5' fill='url(%23k)'/><path d='M37 41 L63 19 L72 26 L47 44 Z' fill='url(%23k)'/><path d='M37 41 L47 44 L72 63 L63 70 Z' fill='url(%23k)'/></svg>"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* ── Paleta CustomerControl-inspired ── */
  --bg:#0f172a;
  --surf:#1e293b;
  --surf2:#263348;
  --surf3:#2d3f58;
  --brd:#334155;
  --brd2:#3e5068;
  /* Azul primario */
  --acc:#3b82f6;
  --acc-h:#2563eb;
  --acc-l:rgba(59,130,246,.12);
  /* Colores semánticos */
  --grn:#22c55e;
  --grn-l:rgba(34,197,94,.12);
  --red:#ef4444;
  --red-l:rgba(239,68,68,.12);
  --ylw:#f59e0b;
  --ylw-l:rgba(245,158,11,.12);
  --pur:#8b5cf6;
  --pur-l:rgba(139,92,246,.12);
  --sky:#0ea5e9;
  --sky-l:rgba(14,165,233,.12);
  /* Texto */
  --txt:#f1f5f9;
  --txt2:#94a3b8;
  --txt3:#64748b;
  /* Sidebar */
  --sb-bg:#1e293b;
  --sb-active:#3b82f6;
  --sb-active-bg:rgba(59,130,246,.15);
  --sb-hover:rgba(255,255,255,.05);
  /* Sombras */
  --shadow:0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);
  --shadow-md:0 4px 6px rgba(0,0,0,.3),0 2px 4px rgba(0,0,0,.2);
  --shadow-lg:0 10px 25px rgba(0,0,0,.4);
}
html,body{min-height:100%;width:100%;overflow-x:hidden;}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:14px;line-height:1.5;}
#app{min-height:100vh;}

/* ── SPINNER ── */
.ldf{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:var(--bg);}
.sp{width:40px;height:40px;border:3px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── LOGIN ── */
.lp{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
    background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);}
.lc{background:var(--surf);border:1px solid var(--brd);border-radius:16px;padding:36px 40px;
    width:420px;max-width:100%;box-shadow:var(--shadow-lg),0 0 0 1px rgba(59,130,246,.1);}
.login-logo-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:28px;}
.login-logo-svg{width:80px;height:80px;margin-bottom:12px;
    filter:drop-shadow(0 4px 12px rgba(59,130,246,.5));
    animation:logoFloat 3s ease-in-out infinite;}
@keyframes logoFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
.login-brand{font-size:26px;font-weight:800;color:var(--txt);letter-spacing:-.5px;}
.login-brand span{color:var(--acc);}
.login-sub{font-size:11px;color:var(--txt3);letter-spacing:2px;margin-top:4px;text-transform:uppercase;}
.login-author{font-size:11px;color:var(--txt3);margin-top:3px;}

/* Password toggle */
.pw-wrap{position:relative;display:block;}
.pw-wrap .fi{padding-right:44px;width:100%;}
.pw-eye{position:absolute;right:11px;top:50%;transform:translateY(-50%);
    background:none;border:none;cursor:pointer;color:var(--txt3);padding:4px;
    display:flex;align-items:center;justify-content:center;transition:.15s;border-radius:4px;
    line-height:0;}


/* ── SIDEBAR ── */
.sb{width:220px;min-width:220px;background:var(--sb-bg);border-right:1px solid var(--brd);
    display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;overflow:hidden;z-index:20;}
/* El main necesita margen izquierdo para compensar el sidebar fijo */
.main{flex:1;display:flex;flex-direction:column;min-width:0;margin-left:220px;}
.logo-bar{padding:16px 18px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:10px;
    background:linear-gradient(135deg,var(--surf) 0%,var(--surf2) 100%);}
.logo-svg{width:34px;height:34px;flex-shrink:0;filter:drop-shadow(0 2px 6px rgba(59,130,246,.5));}
.logo-name{font-size:16px;font-weight:800;color:var(--txt);line-height:1.1;}
.logo-name span{color:var(--acc);}
.logo-by{font-size:9px;color:var(--txt3);letter-spacing:.8px;text-transform:uppercase;margin-top:1px;}
/* Nav section label */
.nav-section{font-size:9px;font-weight:700;color:var(--txt3);letter-spacing:1.2px;text-transform:uppercase;
    padding:14px 18px 6px;}
nav{flex:1;padding:6px 0;overflow-y:auto;}
nav::-webkit-scrollbar{width:3px;}
nav::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:3px;}
.ni{display:flex;align-items:center;gap:10px;padding:9px 16px;margin:1px 8px;border-radius:8px;
    cursor:pointer;font-size:13px;font-weight:500;color:var(--txt2);
    transition:all .15s;user-select:none;position:relative;}
.ni:hover{color:var(--txt);background:var(--sb-hover);}
.ni.on{color:#fff;background:var(--sb-active-bg);font-weight:600;}
.ni.on .ni-ico-wrap{background:var(--acc);color:#fff;}
.ni.on::before{content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);
    width:3px;height:60%;background:var(--acc);border-radius:0 3px 3px 0;}
/* Icono con fondo coloreado */
.ni-ico-wrap{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;
    font-size:14px;flex-shrink:0;transition:.15s;background:var(--surf3);color:var(--txt2);}
.ni:hover .ni-ico-wrap{background:var(--surf3);color:var(--txt);}
/* Iconos de color por sección */
.ni[data-sec="dash"] .ni-ico-wrap{background:rgba(59,130,246,.15);color:var(--acc);}
.ni[data-sec="facs"] .ni-ico-wrap{background:rgba(139,92,246,.15);color:var(--pur);}
.ni[data-sec="cls"] .ni-ico-wrap{background:rgba(34,197,94,.15);color:var(--grn);}
.ni[data-sec="mor"] .ni-ico-wrap{background:rgba(245,158,11,.15);color:var(--ylw);}
.ni[data-sec="rank"] .ni-ico-wrap{background:rgba(14,165,233,.15);color:var(--sky);}
.ni[data-sec="dash"].on .ni-ico-wrap{background:var(--acc);color:#fff;}
.ni[data-sec="facs"].on .ni-ico-wrap{background:var(--pur);color:#fff;}
.ni[data-sec="cls"].on .ni-ico-wrap{background:var(--grn);color:#fff;}
.ni[data-sec="mor"].on .ni-ico-wrap{background:var(--ylw);color:#000;}
.ni[data-sec="rank"].on .ni-ico-wrap{background:var(--sky);color:#fff;}
.ni-label{flex:1;}
.nb{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;
    min-width:20px;text-align:center;}
/* Sidebar footer */
.sbf{padding:14px 16px;border-top:1px solid var(--brd);background:var(--surf2);}
.sb-user{display:flex;align-items:center;gap:10px;}
.av{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--acc-h),var(--acc));
    display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;
    box-shadow:0 2px 8px rgba(59,130,246,.4);}
.sb-user-info{}
.sb-user-name{font-size:13px;font-weight:600;color:var(--txt);line-height:1.2;}
.sb-user-role{font-size:11px;color:var(--txt3);}
/* Online badge */
.online-dot{width:8px;height:8px;background:var(--grn);border-radius:50%;border:2px solid var(--surf2);
    position:absolute;bottom:0;right:0;animation:pls 2s infinite;}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;
    background:var(--surf);border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:10;
    box-shadow:var(--shadow);flex-wrap:wrap;gap:8px;}
.tb-left{display:flex;align-items:center;gap:10px;}
.tb-t{font-size:16px;font-weight:700;color:var(--txt);}
.tb-s{font-size:12px;color:var(--txt3);display:flex;align-items:center;gap:5px;}
.pls{width:7px;height:7px;border-radius:50%;background:var(--grn);animation:pls 2s infinite;flex-shrink:0;}
@keyframes pls{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
/* Breadcrumb separator */
.tb-sep{color:var(--txt3);font-size:13px;margin:0 2px;}
/* Period selector - estilo CustomerControl */
select.sel{background:var(--surf2);border:1px solid var(--brd2);color:var(--txt);
    padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;outline:none;font-family:inherit;
    transition:.15s;}
select.sel:hover{border-color:var(--acc);}
/* Botón Salir */
.btn-salir{padding:6px 14px;border-radius:8px;border:1px solid var(--brd2);background:var(--surf2);
    color:var(--txt2);cursor:pointer;font-size:12px;font-weight:600;transition:.15s;
    display:inline-flex;align-items:center;gap:7px;font-family:inherit;}
.btn-salir:hover{border-color:var(--red);color:var(--red);background:var(--red-l);}
/* Hamburger */
.hamburger{display:none;align-items:center;justify-content:center;width:34px;height:34px;
    background:var(--surf2);border:1px solid var(--brd);border-radius:8px;cursor:pointer;font-size:16px;flex-shrink:0;}

/* ── CONTENT ── */
.content{padding:20px 24px;flex:1;background:var(--bg);}
/* Page header */
.page-hdr{margin-bottom:20px;}
.page-hdr h2{font-size:20px;font-weight:700;color:var(--txt);}
.page-hdr p{font-size:13px;color:var(--txt3);margin-top:2px;}

/* ── KPI CARDS ── */
.kgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:20px;}
.kc{background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:16px 18px;
    position:relative;overflow:hidden;transition:all .2s;cursor:default;}
.kc:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--brd2);}
/* Barra de color superior */
.kc-bar{position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0;}
/* Icono con fondo */
.kc-icon-wrap{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;
    font-size:18px;margin-bottom:12px;}
.kc-l{font-size:10px;color:var(--txt3);font-weight:600;letter-spacing:.3px;text-transform:uppercase;margin-bottom:4px;}
.kc-v{font-size:22px;font-weight:800;color:var(--txt);letter-spacing:-1px;margin-bottom:2px;}
.kc-s{font-size:11px;color:var(--txt3);}
/* Colores por KPI */
.kc-blue .kc-bar{background:var(--acc);}
.kc-blue .kc-icon-wrap{background:var(--acc-l);}
.kc-green .kc-bar{background:var(--grn);}
.kc-green .kc-icon-wrap{background:var(--grn-l);}
.kc-yellow .kc-bar{background:var(--ylw);}
.kc-yellow .kc-icon-wrap{background:var(--ylw-l);}
.kc-red .kc-bar{background:var(--red);}
.kc-red .kc-icon-wrap{background:var(--red-l);}
.kc-purple .kc-bar{background:var(--pur);}
.kc-purple .kc-icon-wrap{background:var(--pur-l);}

/* ── CARDS GENÉRICAS ── */
.g2{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;margin-bottom:16px;}
.card{background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:18px;
    box-shadow:var(--shadow);}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.ct{font-size:13px;font-weight:700;color:var(--txt);display:flex;align-items:center;gap:8px;}
.cdot{width:8px;height:8px;border-radius:50%;}
.cbadge{font-size:11px;padding:3px 10px;border-radius:99px;background:var(--acc-l);
    color:var(--acc);font-weight:600;border:1px solid rgba(59,130,246,.2);}

/* ── TABLA ── */
.tbl-wrap{overflow-x:auto;border-radius:10px;}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:680px;}
thead{background:var(--surf2);}
th{text-align:left;padding:10px 12px;font-size:11px;font-weight:600;letter-spacing:.5px;
    text-transform:uppercase;color:var(--txt3);border-bottom:1px solid var(--brd);}
td{padding:11px 12px;border-bottom:1px solid var(--brd);vertical-align:middle;color:var(--txt);}
tr:last-child td{border:none;}
tbody tr{transition:background .12s;}
tbody tr:hover td{background:rgba(255,255,255,.03);}

/* ── CHIPS/BADGES ── */
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:99px;
    font-size:11px;font-weight:600;}
.cg{background:var(--grn-l);color:var(--grn);}
.cr{background:var(--red-l);color:var(--red);}
.cy{background:var(--ylw-l);color:var(--ylw);}
.cb{background:var(--acc-l);color:var(--acc);}
.cp{background:var(--pur-l);color:var(--pur);}
/* Punto de estado */
.chip.cg::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--grn);}
.chip.cr::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--red);}
.chip.cy::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--ylw);}

/* ── SERVICIOS GRID ── */
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.si{background:var(--surf2);border:1px solid var(--brd);border-radius:10px;padding:12px 14px;
    transition:.15s;position:relative;overflow:hidden;}
.si:hover{border-color:var(--brd2);}
.si-bar{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;}
.si-n{font-size:10px;color:var(--txt3);letter-spacing:.3px;text-transform:uppercase;margin-bottom:6px;font-weight:600;}
.si-v{font-size:16px;font-weight:800;color:var(--txt);}
.si-s{font-size:11px;color:var(--txt3);margin-top:3px;}

/* ── BOTONES ── */
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;
    transition:all .15s;display:inline-flex;align-items:center;gap:6px;font-family:inherit;white-space:nowrap;}
.bp{background:var(--acc);color:#fff;box-shadow:0 2px 8px rgba(59,130,246,.3);}
.bp:hover{background:var(--acc-h);box-shadow:0 4px 12px rgba(59,130,246,.4);}
.bg{background:var(--surf2);border:1px solid var(--brd2);color:var(--txt2);}
.bg:hover{border-color:var(--acc);color:var(--acc);background:var(--acc-l);}
.bsm{padding:5px 12px;font-size:12px;}
.bgrn{background:var(--grn);color:#fff;box-shadow:0 2px 8px rgba(34,197,94,.3);}
.bgrn:hover{opacity:.88;}
.bred{background:var(--red);color:#fff;}
.bpur{background:var(--pur);color:#fff;box-shadow:0 2px 8px rgba(139,92,246,.3);}
.bpur:hover{opacity:.88;}

/* ── MODAL ── */
.mb{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-start;
    justify-content:center;z-index:1000;backdrop-filter:blur(4px);overflow-y:auto;padding:20px;}
.mo{background:var(--surf);border:1px solid var(--brd);border-radius:14px;padding:24px;
    width:560px;max-width:100%;box-shadow:var(--shadow-lg);margin:auto;}
.mo-t{font-size:16px;font-weight:700;color:var(--txt);margin-bottom:20px;display:flex;align-items:center;gap:8px;}

/* Formulario */
.fg{margin-bottom:14px;}
.fl{font-size:11px;font-weight:600;color:var(--txt2);letter-spacing:.3px;display:block;margin-bottom:6px;}
.fi{width:100%;background:var(--surf2);border:1px solid var(--brd2);color:var(--txt);
    padding:9px 12px;border-radius:8px;font-size:13px;outline:none;transition:.15s;font-family:inherit;}
.fi:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(59,130,246,.15);}
.fi::placeholder{color:var(--txt3);}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fa{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap;}

/* Detalle línea factura */
.det-box{background:var(--surf2);border:1px solid var(--brd);border-radius:10px;padding:14px;margin-bottom:10px;}
.det-grid{display:grid;grid-template-columns:1fr 100px 130px 36px;gap:8px;align-items:end;}
.det-lbl{font-size:10px;color:var(--txt3);font-weight:600;letter-spacing:.3px;margin-bottom:5px;}
.det-sub{font-size:12px;color:var(--txt3);margin-top:10px;padding-top:10px;border-top:1px solid var(--brd);}

/* Total box */
.tot-box{background:linear-gradient(135deg,rgba(59,130,246,.08),rgba(139,92,246,.08));
    border:1px solid rgba(59,130,246,.2);border-radius:10px;padding:14px 16px;
    display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}

/* Upload */
.uz{border:2px dashed var(--brd2);border-radius:10px;padding:24px;text-align:center;
    cursor:pointer;transition:.2s;position:relative;overflow:hidden;background:var(--surf2);}
.uz:hover,.uz.drag{border-color:var(--acc);background:var(--acc-l);}
.uz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.cpv{border:1px solid var(--brd);border-radius:10px;overflow:hidden;}
.cpv img{width:100%;max-height:200px;object-fit:contain;background:var(--surf2);display:block;}
.cpvb{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;
    background:var(--acc-l);border-top:1px solid var(--brd);}
.cpvn{font-size:12px;color:var(--acc);font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cpvx{background:none;border:none;color:var(--red);cursor:pointer;font-size:13px;}
.compbtn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;
    font-size:11px;font-weight:600;background:var(--acc-l);color:var(--acc);cursor:pointer;
    border:1px solid rgba(59,130,246,.2);transition:.15s;}
.compbtn:hover{background:rgba(59,130,246,.2);}

/* Detalle factura modal */
.det-fac-hdr{background:var(--surf2);border-radius:10px;padding:16px;margin-bottom:16px;border:1px solid var(--brd);}
.det-fac-table{width:100%;border-collapse:collapse;font-size:13px;min-width:0;}
.det-fac-table th{text-align:left;padding:8px 12px;font-size:11px;font-weight:600;color:var(--txt3);
    text-transform:uppercase;border-bottom:1px solid var(--brd);background:var(--surf2);}
.det-fac-table td{padding:10px 12px;border-bottom:1px solid var(--brd);color:var(--txt);}
.det-fac-table tr:last-child td{border:none;}
.det-tot{background:var(--acc-l);border-top:2px solid rgba(59,130,246,.3);}

/* Lightbox */
.lbox{position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;z-index:2000;}
.lbox img{max-width:90vw;max-height:88vh;border-radius:12px;box-shadow:var(--shadow-lg);}
.lbox-x{position:fixed;top:16px;right:20px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
    color:#fff;font-size:18px;cursor:pointer;border-radius:50%;width:38px;height:38px;
    display:flex;align-items:center;justify-content:center;transition:.15s;}
.lbox-x:hover{background:rgba(255,255,255,.22);}

/* Ranking */
.rr{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--brd);}
.rr:last-child{border:none;}
.rn{width:28px;height:28px;border-radius:8px;background:var(--surf2);border:1px solid var(--brd);
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--txt3);flex-shrink:0;}
.rn.top{background:linear-gradient(135deg,#1d4ed8,var(--acc));border:none;color:#fff;}
.pb{height:6px;border-radius:99px;background:var(--surf2);flex:1;overflow:hidden;}
.pf{height:100%;border-radius:99px;}
.pred{background:linear-gradient(135deg,rgba(139,92,246,.1),rgba(59,130,246,.08));

// Periodos: desde Ene 2026 hasta mes actual
function periodos(){
  var list=[];
  var cur=new Date(2026,0,1);
  var now=new Date();
  while(cur.getFullYear()<now.getFullYear()||(cur.getFullYear()===now.getFullYear()&&cur.getMonth()<=now.getMonth())){
    var y=cur.getFullYear();var m=cur.getMonth()+1;
    list.push(y+'-'+(m<10?'0':'')+m);
    cur.setMonth(cur.getMonth()+1);
  }
  return list;
}

var DB={

    sel=sel||'*';filters=filters||{};
    var url=SURL+'/rest/v1/'+table+'?select='+encodeURIComponent(sel)+'&limit=1000&order=id.desc';
    Object.keys(filters).forEach(function(k){url+='&'+k+'=eq.'+encodeURIComponent(filters[k]);});
    return fetch(url,{headers:sh()}).then(function(r){return r.json().then(function(d){if(!r.ok)throw new Error(JSON.stringify(d));return d;});});
  },
  post:function(table,body){
    return fetch(SURL+'/rest/v1/'+table,{method:'POST',headers:sh(),body:JSON.stringify(body)})

// ── CARGA DATOS ───────────────────────────────────────────────
function cargar(){
  return Promise.all([
    DB.get('clientes').then(function(d){S.cls=d||[];}).catch(function(){S.cls=[];}),
    DB.get('servicios').then(function(d){S.svcs=d&&d.length?d:SVCS_DEF;}).catch(function(){S.svcs=SVCS_DEF;}),
    cargarFacs()
  ]);
}
function cargarFacs(){
  return DB.get('facturas','*,clientes(nombre,empresa)',{periodo_servicio:S.per})
  .then(function(fcs){
    S.fcs=fcs||[];
    if(!S.fcs.length){S.dets={};return;}
    var ids=S.fcs.map(function(f){return f.id;});
    // Fetch detalles WITHOUT join to avoid Supabase IN-clause join bug
    // We resolve the service name client-side using S.svcs
    var url=SURL+'/rest/v1/factura_detalles?select=id,factura_id,servicio_id,cantidad,precio_unitario,subtotal&factura_id=in.('+ids.join(',')+')'+'&limit=2000';
    return fetch(url,{headers:sh()})
    .then(function(r){return r.json();}).then(function(dets){
      S.dets={};
      var svcMap={};
      // Build servicio_id -> {codigo, nombre} map from loaded svcs
      (S.svcs.length?S.svcs:SVCS_DEF).forEach(function(s){svcMap[s.id]={codigo:s.codigo,nombre:s.nombre};});
      // Also add SVCS_DEF as fallback using their array index
      SVCS_DEF.forEach(function(s,i){if(!svcMap[i+1])svcMap[i+1]={codigo:s.codigo,nombre:s.nombre};});
      (dets||[]).forEach(function(d){
        // Attach service info client-side
        var svc=svcMap[d.servicio_id];
        d.servicios=svc?{codigo:svc.codigo,nombre:svc.nombre}:{codigo:'',nombre:'Servicio desconocido'};
        if(!S.dets[d.factura_id])S.dets[d.factura_id]=[];
        S.dets[d.factura_id].push(d);
      });
    }).catch(function(){S.dets={};});
  }).catch(function(){S.fcs=[];S.dets={};});
}

// ── DASHBOARD ─────────────────────────────────────────────────
function calcK(){
  var f=S.fcs,cm={};S.cls.forEach(function(c){cm[c.id]=c;});
  var tot=f.reduce(function(s,x){return s+(parseFloat(x.total)||0);},0);
  var pag=f.filter(function(x){return x.estado==='Pagada';}).length;
  var cob=f.filter(function(x){return x.estado==='Pagada';}).reduce(function(s,x){return s+(parseFloat(x.total)||0);},0);
  var pct=f.length?Math.round(pag*100/f.length):0;
  var act=f.filter(function(x){var c=cm[x.cliente_id];return c&&c.estado==='Activo';});
  var pA=act.filter(function(x){return x.estado==='Pendiente';}).length;
  var nm=S.cls.filter(function(c){return !c.es_general&&c.creado_en&&c.creado_en.substring(0,7)===S.per;}).length;
  return{tot:tot,cob:cob,pend:tot-cob,pct:pct,nm:nm,totF:f.length,pag:pag};
}
function calcSvc(){
  var map={};
  (S.svcs.length?S.svcs:SVCS_DEF).forEach(function(s){
    var d=SVCS_DEF.find(function(x){return x.codigo===s.codigo;});
    map[s.codigo]={nombre:s.nombre,color:d?d.color:'#fff',q:0,tot:0,cob:0};
  });
  S.fcs.forEach(function(fac){
    (S.dets[fac.id]||[]).forEach(function(d){
      var cod=d.servicios&&d.servicios.codigo?d.servicios.codigo:'';
      if(!map[cod])return;
      map[cod].q+=(parseInt(d.cantidad)||0);
      map[cod].tot+=(parseFloat(d.subtotal)||0);
      if(fac.estado==='Pagada')map[cod].cob+=(parseFloat(d.subtotal)||0);
    });
  });
  return map;
}

// ── MOROSIDAD ─────────────────────────────────────────────────
function rMor(){
  var cm={};S.cls.forEach(function(c){cm[c.id]=c;});
  var mor={};
  S.fcs.filter(function(f){return f.estado==='Pendiente';}).forEach(function(f){
    var c=cm[f.cliente_id];if(!c||c.estado!=='Activo'||c.es_general)return;
    if(!mor[f.cliente_id])mor[f.cliente_id]={c:c,fcs:[],tot:0};
    mor[f.cliente_id].fcs.push(f);mor[f.cliente_id].tot+=parseFloat(f.total)||0;
  });
  var mk=Object.keys(mor);
  var susp=S.cls.filter(function(c){return c.estado==='Suspendido'&&!c.es_general;});
  var ds=function(id){return S.fcs.filter(function(f){return f.cliente_id===id&&f.estado==='Pendiente';}).reduce(function(s,f){return s+(parseFloat(f.total)||0);},0);};
  var mr=mk.length===0?'<tr><td colspan="5" style="text-align:center;color:var(--grn);font-weight:700;padding:22px;">🎉 Sin morosidad</td></tr>':
  mk.map(function(k){var m=mor[k];return '<tr><td style="font-weight:700;">'+esc(m.c.nombre)+'</td><td>'+esc(m.c.empresa||'—')+'</td><td><span class="chip cy">'+m.fcs.length+'</span></td><td><span style="font-weight:800;color:var(--red);">'+fmt(m.tot)+'</span></td><td><span class="chip '+(m.tot>10000?'cr':m.tot>5000?'cy':'cb')+'">'+(m.tot>10000?'🔴 Alto':m.tot>5000?'🟡 Medio':'🟢 Bajo')+'</span></td></tr>';}).join('');
  var sr=susp.length===0?'<tr><td colspan="4" style="text-align:center;color:var(--txt3);padding:14px;">Sin clientes suspendidos</td></tr>':
  susp.map(function(c){return '<tr><td>'+esc(c.nombre)+'</td><td>'+esc(c.empresa||'—')+'</td><td style="font-weight:700;color:var(--txt3);">'+fmt(ds(c.id))+'</td><td><span class="chip cr">🚫</span></td></tr>';}).join('');
  return '<div class="card tbl-wrap" style="margin-bottom:14px;"><div class="ch"><div class="ct"><div class="cdot" style="background:var(--red)"></div>⚠️ Morosos — '+ml(S.per)+'</div><span class="chip cr">'+mk.length+'</span></div>'+
  '<table><thead><tr>'+['Cliente','Empresa','Pend.','Deuda','Riesgo'].map(function(h){return '<th>'+h+'</th>';}).join('')+'</tr></thead><tbody>'+mr+'</tbody></table></div>'+
  '<div class="card tbl-wrap"><div class="ch"><div class="ct"><div class="cdot" style="background:var(--txt3)"></div>🚫 Suspendidos</div></div>'+
  '<div class="al aly">⚠️ No afectan métricas de morosidad</div>'+
  '<table><thead><tr>'+['Cliente','Empresa','Deuda',''].map(function(h){return '<th>'+h+'</th>';}).join('')+'</tr></thead><tbody>'+sr+'</tbody></table></div>';
}

// ── RANKING ───────────────────────────────────────────────────
function rRank(){
  var ranking=S.cls.filter(function(c){return !c.es_general;}).map(function(c){
    var ff=S.fcs.filter(function(f){return f.cliente_id===c.id;});
    var tot=ff.reduce(function(s,f){return s+(parseFloat(f.total)||0);},0);
    var pag=ff.filter(function(f){return f.estado==='Pagada';}).reduce(function(s,f){return s+(parseFloat(f.total)||0);},0);
    var pct=tot>0?Math.round(pag*100/tot):0;
    return{c:c,tot:tot,pag:pag,pct:pct};
  }).sort(function(a,b){return b.pct-a.pct;});
  var ri=ranking.length===0?'<div style="text-align:center;padding:22px;color:var(--txt3);">Sin datos</div>':
  ranking.map(function(r,i){var col=r.pct>=80?'var(--grn)':r.pct>=50?'var(--ylw)':'var(--red)';

    '<div style="text-align:right;"><div style="font-weight:800;font-size:13px;color:var(--acc);">'+fmt(r.pag)+'</div><div style="font-size:10px;color:var(--txt3);">de '+fmt(r.tot)+'</div></div></div>';

  scales:{x:{grid:{color:'rgba(26,45,80,.4)'},ticks:{color:'#94a3b8',font:{size:12}}},y:{grid:{color:'rgba(26,45,80,.4)'},ticks:{color:'#94a3b8',font:{size:10},callback:function(v){return 'RD$'+v.toLocaleString();}}}}}});

// ── ACTUALIZAR TOTAL EN TIEMPO REAL ───────────────────────────
function recalcTotal(){
  var tot=0;
  S.fForm.dets.forEach(function(d,i){
    var qEl=document.getElementById('dq'+i);
    var pEl=document.getElementById('dp'+i);
    var q=qEl?parseFloat(qEl.value)||0:parseFloat(d.q)||0;
    var p=pEl?parseFloat(pEl.value)||0:parseFloat(d.p)||0;
    var sub=q*p;tot+=sub;
    // Actualizar subtotal de línea
    var subEl=document.getElementById('sub'+i);if(subEl)subEl.textContent=fmt(sub);
  });
  var td=document.getElementById('totalDisp');if(td)td.textContent=fmt(tot);
}

  if(bnc)bnc.onclick=function(){S.editC=null;S.cForm={n:'',e:'',em:'',tl:'',st:'Activo'};S.modal={tp:'cli'};R();};
  document.querySelectorAll('[data-edit]').forEach(function(b){
    b.onclick=function(){var c=S.cls.find(function(x){return x.id===+b.dataset.edit;});S.editC=c;S.cForm={n:c.nombre,e:c.empresa||'',em:c.email||'',tl:c.telefono||'',st:c.estado};S.modal={tp:'cli'};R();};
  });
  document.querySelectorAll('[data-del]').forEach(function(b){
    b.onclick=function(){if(!confirm('¿Eliminar este cliente?'))return;
      DB.del('clientes',+b.dataset.del).then(function(){return DB.get('clientes');}).then(function(d){S.cls=d||[];S.toast={m:'🗑️ Cliente eliminado',c:'var(--ylw)'};R();}).catch(function(e){alert('Error: '+e.message);});};
  });
  bModal();
}

function bModal(){
  var mbg=document.getElementById('mbg');if(mbg)mbg.onclick=function(e){if(e.target===mbg){S.modal=null;S.pPreview=null;R();}};
  var can=document.getElementById('moCan');if(can)can.onclick=function(){S.modal=null;S.pPreview=null;R();};
  var save=document.getElementById('moSave');if(!save||!S.modal)return;

  // FACTURA
  if(S.modal.tp==='fac'){
    document.querySelectorAll('[data-ftp]').forEach(function(b){b.onclick=function(){saveForm();S.fForm.tp=b.dataset.ftp;R();};});
    document.querySelectorAll('[data-dsi]').forEach(function(el){el.onchange=function(){saveForm();S.fForm.dets[+el.dataset.dsi].si=+el.value;R();};});
    // Cantidad y precio: actualizar en tiempo real SIN re-render
    document.querySelectorAll('[id^="dq"]').forEach(function(el){el.oninput=function(){var i=parseInt(el.id.replace('dq',''));if(S.fForm.dets[i])S.fForm.dets[i].q=el.value;recalcTotal();};});
    document.querySelectorAll('[id^="dp"]').forEach(function(el){el.oninput=function(){var i=parseInt(el.id.replace('dp',''));if(S.fForm.dets[i])S.fForm.dets[i].p=el.value;recalcTotal();};});
    document.querySelectorAll('[data-drem]').forEach(function(b){b.onclick=function(){saveForm();S.fForm.dets.splice(+b.dataset.drem,1);if(!S.fForm.dets.length)S.fForm.dets.push({si:'',q:'1',p:''});R();};});
    var ad=document.getElementById('addDet');if(ad)ad.onclick=function(){saveForm();S.fForm.dets.push({si:'',q:'1',p:''});R();};
    var mfCi=document.getElementById('mfCi');if(mfCi)mfCi.onchange=function(){S.fForm.ci=mfCi.value;};
    var mfFe=document.getElementById('mfFe');if(mfFe)mfFe.onchange=function(){S.fForm.fe=mfFe.value;};
    // ── Buscador de cliente por email / nombre ──
    var mfSearch=document.getElementById('mfSearch');
    var mfDrop=document.getElementById('mfDrop');
    var mfHid=document.getElementById('mfCi');
    if(mfSearch&&mfDrop){
      var showDrop=function(q){
        q=q.toLowerCase().trim();
        if(!q){mfDrop.style.display='none';return;}
        var matches=S.cls.filter(function(c){
          return (c.email||'').toLowerCase().indexOf(q)>-1||
                 (c.nombre||'').toLowerCase().indexOf(q)>-1||
                 (c.empresa||'').toLowerCase().indexOf(q)>-1;
        }).slice(0,8);
        if(!matches.length){
          mfDrop.innerHTML='<div style="padding:10px 14px;font-size:12px;color:var(--txt3);">Sin resultados</div>';
        }else{
          mfDrop.innerHTML=matches.map(function(c){
            return '<div class="cli-opt" data-id="'+c.id+'" data-label="'+esc(c.email||c.nombre)+'" '+
            'style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--brd);font-size:13px;">'+
            '<div style="font-weight:600;color:var(--txt);">'+esc(c.nombre)+'</div>'+
            '<div style="font-size:11px;color:var(--txt3);">'+esc(c.email||'')+(c.empresa?' · '+esc(c.empresa):'')+'</div>'+
            '</div>';
          }).join('');
          mfDrop.querySelectorAll('.cli-opt').forEach(function(el){
            el.onmousedown=function(e){
              e.preventDefault();
              S.fForm.ci=el.dataset.id;
              mfSearch.value=el.dataset.label;
              if(mfHid)mfHid.value=el.dataset.id;
              mfDrop.style.display='none';
            };
            el.onmouseover=function(){el.style.background='var(--surf2)';};
            el.onmouseout=function(){el.style.background='';};
          });
        }
        mfDrop.style.display='block';
      };
      mfSearch.oninput=function(){showDrop(mfSearch.value);};
      mfSearch.onfocus=function(){if(mfSearch.value)showDrop(mfSearch.value);};
      mfSearch.onblur=function(){setTimeout(function(){mfDrop.style.display='none';},200);};
    }
    save.onclick=function(){
      saveForm();
      var f=S.fForm;
      if(!f.ci||!f.fe){alert('Selecciona cliente y fecha de emisión');return;}
      if(f.dets.some(function(d){return !d.si;})){alert('Selecciona el servicio en cada línea');return;}
      save.textContent='Guardando...';save.disabled=true;
      var periodo=f.fe.substring(0,7);
      var num='KNX-'+Date.now().toString().slice(-6);
      DB.post('facturas',{cliente_id:+f.ci,numero_factura:num,tipo_factura:f.tp,fecha_emision:f.fe,periodo_servicio:periodo,estado:'Pendiente',total:0})
      .then(function(fac){
        var proms=f.dets.map(function(d){return DB.post('factura_detalles',{factura_id:fac.id,servicio_id:+d.si,cantidad:parseInt(d.q)||1,precio_unitario:parseFloat(d.p)||0});});
        return Promise.all(proms);
      }).then(function(){return cargarFacs();}).then(function(){
        S.modal=null;S.toast={m:'✅ Factura '+num+' guardada',c:'var(--grn)'};R();
      }).catch(function(e){alert('Error al guardar: '+e.message);save.textContent='💾 Guardar Factura';save.disabled=false;});
    };
  }

  // PAGAR
  if(S.modal.tp==='pag'){
    var pFe=document.getElementById('pFe');if(pFe)pFe.onchange=function(){S.pFecha=pFe.value;};
    var loadF=function(file){
      if(!file)return;if(file.size>10*1024*1024){alert('Máximo 10MB');return;}
      S.pFile=file;S.pFileName=file.name;
      var reader=new FileReader();reader.onload=function(e){S.pPreview=e.target.result;R();bModal();};reader.readAsDataURL(file);
    };
    var cfi=document.getElementById('cmpFile');if(cfi)cfi.onchange=function(){loadF(cfi.files[0]);};
    var uzn=document.getElementById('uzn');
    if(uzn){uzn.ondragover=function(e){e.preventDefault();uzn.classList.add('drag');};uzn.ondragleave=function(){uzn.classList.remove('drag');};uzn.ondrop=function(e){e.preventDefault();uzn.classList.remove('drag');loadF(e.dataTransfer.files[0]);};}
    var rc=document.getElementById('remComp');if(rc)rc.onclick=function(){S.pFile=null;S.pFileName='';S.pPreview=null;R();bModal();};
    save.onclick=function(){
      var fecha=document.getElementById('pFe')?document.getElementById('pFe').value:td();
      save.textContent='Guardando...';save.disabled=true;
      var doUpdate=function(urlComp){
        DB.patch('facturas',S.pagarF.id,{estado:'Pagada',fecha_pago:fecha,url_comprobante:urlComp||null,actualizado_en:new Date().toISOString()})
        .then(function(){return cargarFacs();}).then(function(){
          S.modal=null;S.pPreview=null;
          S.toast={m:'✅ Pago registrado'+(urlComp?' · Comprobante guardado 🖼️':''),c:'var(--grn)'};R();
        }).catch(function(e){alert('Error: '+e.message);save.textContent='✅ Confirmar Pago';save.disabled=false;});
      };
      if(S.pFile){
        var ext=S.pFile.name.split('.').pop().toLowerCase();
        var path=S.pagarF.numero_factura+'_'+Date.now()+'.'+ext;
        DB.upload(path,S.pFile).then(function(url){if(!url){alert('No se pudo subir el comprobante.\nVerifica Supabase → Storage → Policies.\nEl pago se guardará sin comprobante.');doUpdate(null);}else doUpdate(url);});
      }else{doUpdate(null);}
    };
  }

  // SUBIR COMPROBANTE (factura ya pagada)
  if(S.modal.tp==='comp'){
    var loadF2=function(file){
      if(!file)return;
      if(file.size>10*1024*1024){alert('Máximo 10MB');return;}
      S.pFile=file;S.pFileName=file.name;
      var reader=new FileReader();
      reader.onload=function(e){S.pPreview=e.target.result;R();bModal();};
      reader.readAsDataURL(file);
    };
    var cfi2=document.getElementById('cmpFile');if(cfi2)cfi2.onchange=function(){loadF2(cfi2.files[0]);};
    var uzn2=document.getElementById('uzn');
    if(uzn2){
      uzn2.ondragover=function(e){e.preventDefault();uzn2.classList.add('drag');};
      uzn2.ondragleave=function(){uzn2.classList.remove('drag');};
      uzn2.ondrop=function(e){e.preventDefault();uzn2.classList.remove('drag');loadF2(e.dataTransfer.files[0]);};
    }
    var rc2=document.getElementById('remComp');
    if(rc2)rc2.onclick=function(){S.pFile=null;S.pFileName='';S.pPreview=null;R();bModal();};
    save.onclick=function(){
      if(!S.pFile){alert('Selecciona una imagen primero');return;}
      save.textContent='Subiendo...';save.disabled=true;
      var ext=S.pFile.name.split('.').pop().toLowerCase();
      var path=S.pagarF.numero_factura+'_'+Date.now()+'.'+ext;
      DB.upload(path,S.pFile).then(function(url){
        if(!url){alert('No se pudo subir el comprobante.\nVerifica Supabase → Storage → Policies.');save.textContent='Guardar comprobante';save.disabled=false;return;}
        DB.patch('facturas',S.pagarF.id,{url_comprobante:url,actualizado_en:new Date().toISOString()})
        .then(function(){return cargarFacs();}).then(function(){
          S.modal=null;S.pPreview=null;
          S.toast={m:'Comprobante guardado correctamente',c:'var(--grn)'};R();
        }).catch(function(e){alert('Error: '+e.message);save.textContent='Guardar comprobante';save.disabled=false;});
      });
    };
  }

  // CLIENTE
  if(S.modal.tp==='cli'){
    document.querySelectorAll('[data-cst]').forEach(function(b){b.onclick=function(){S.cForm.st=b.dataset.cst;R();};});
    save.onclick=function(){
      var n=document.getElementById('cN')?document.getElementById('cN').value.trim():'';
      if(!n){alert('El nombre es obligatorio');return;}
      save.textContent='Guardando...';save.disabled=true;
      var body={nombre:n,empresa:document.getElementById('cE').value||null,email:document.getElementById('cEm').value||null,telefono:document.getElementById('cTl').value||null,estado:S.cForm.st};
      var p=S.editC?DB.patch('clientes',S.editC.id,body):DB.post('clientes',body);
      p.then(function(){return DB.get('clientes');}).then(function(d){S.cls=d||[];S.modal=null;S.toast={m:S.editC?'✅ Cliente actualizado':'✅ Cliente creado',c:'var(--grn)'};R();}).catch(function(e){alert('Error: '+e.message);save.textContent='💾 Guardar';save.disabled=false;});
    };
  }
}

// ── EXPORTAR EXCEL ────────────────────────────────────────────
function exportarExcel(){
  function doExport(){
    var XLSX=window.XLSX;
    var k=calcK();
    var svc=calcSvc();
    var svcs=S.svcs.length?S.svcs:SVCS_DEF;
    var per=S.per;
    var perLabel=ml(per)+' ('+per+')';

    var ventas=svcs.map(function(s){
      var d=svc[s.codigo]||{q:0,tot:0,cob:0};
      return{
        Servicio:s.nombre,
        Unidades:d.q,
        Facturado_RD:Math.round(d.tot),
        Cobrado_RD:Math.round(d.cob),
        Pendiente_RD:Math.round(d.tot-d.cob),
        Pct_Cobro:d.tot>0?Math.round(d.cob*100/d.tot):0
      };
    });
    var totUds=ventas.reduce(function(a,r){return a+r.Unidades;},0);
    var totFact=ventas.reduce(function(a,r){return a+r.Facturado_RD;},0);
    var totCob=ventas.reduce(function(a,r){return a+r.Cobrado_RD;},0);
    var totPend=ventas.reduce(function(a,r){return a+r.Pendiente_RD;},0);
    var totPct=totFact>0?Math.round(totCob*100/totFact):0;

    // ── Hoja única: Ventas del período ──
    var data=[
      ['KNOX VENTAS - VENTAS: '+perLabel],
      ['Exportado: '+new Date().toLocaleDateString('es-DO')],
      [],
      ['SERVICIO','UNIDADES','FACTURADO RD$','COBRADO RD$','PENDIENTE RD$','% COBRO']
    ];
    ventas.forEach(function(r){
      data.push([r.Servicio,r.Unidades,r.Facturado_RD,r.Cobrado_RD,r.Pendiente_RD,r.Pct_Cobro]);
    });
    data.push(['TOTAL',totUds,totFact,totCob,totPend,totPct]);

    var wb=XLSX.utils.book_new();
    var ws=XLSX.utils.aoa_to_sheet(data);
    ws['!cols']=[{wch:30},{wch:12},{wch:18},{wch:18},{wch:18},{wch:12}];
    ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:5}},{s:{r:1,c:0},e:{r:1,c:5}}];
    XLSX.utils.book_append_sheet(wb,ws,'Ventas '+per);
    XLSX.writeFile(wb,'KnoxVentas_'+per+'.xlsx');
    S.toast={m:'Reporte exportado: KnoxVentas_'+per+'.xlsx',c:'var(--grn)'};
    R();
  }
  if(window.XLSX){doExport();}
  else{
    var sc=document.createElement('script');
    sc.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    sc.onload=function(){doExport();};
    sc.onerror=function(){alert('Error cargando libreria Excel. Verifica tu conexion a internet.');};
    document.head.appendChild(sc);
  }
}

window.onload = function(){R();};
</script>

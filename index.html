<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Knox Ventas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14;--surf:#0d1525;--surf2:#111d35;--brd:#1a2d50;
  --acc:#00e5ff;--acc2:#7b5fff;--grn:#00c853;--red:#ff1744;--ylw:#ffd740;
  --txt:#e8f0fe;--mut:#607d9f;
}
html,body{min-height:100%;width:100%;overflow-x:hidden;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,.025)1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.025)1px,transparent 1px);background-size:36px 36px;pointer-events:none;z-index:0;}
#app{position:relative;z-index:1;min-height:100vh;}
.ldf{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;}
.sp{width:44px;height:44px;border:3px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
/* LOGIN */
.lp{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.lc{background:var(--surf);border:1px solid var(--brd);border-radius:18px;padding:40px;width:420px;max-width:100%;box-shadow:0 0 60px rgba(0,229,255,.07);}
/* SHELL */
.shell{display:flex;min-height:100vh;}
.sb{width:210px;min-width:210px;background:var(--surf);border-right:1px solid var(--brd);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow:hidden;}
.logo{padding:18px 18px 14px;border-bottom:1px solid var(--brd);}
.logo-name{font-size:19px;font-weight:800;background:linear-gradient(90deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-by{font-size:9px;color:var(--mut);letter-spacing:1px;margin-top:1px;}
nav{flex:1;padding:8px 0;overflow-y:auto;}
.ni{display:flex;align-items:center;gap:10px;padding:10px 18px;cursor:pointer;font-size:13px;font-weight:600;color:var(--mut);border-left:3px solid transparent;transition:.15s;user-select:none;}
.ni:hover{color:var(--txt);background:rgba(0,229,255,.04);}
.ni.on{color:var(--acc);background:rgba(0,229,255,.08);border-left-color:var(--acc);}
.ni-i{font-size:15px;width:18px;text-align:center;}
.nb{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:99px;}
.sbf{padding:14px 18px;border-top:1px solid var(--brd);}
.av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--acc2),var(--acc));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:13px 22px;background:rgba(13,21,37,.92);border-bottom:1px solid var(--brd);backdrop-filter:blur(10px);position:sticky;top:0;z-index:10;flex-wrap:wrap;gap:8px;}
.tb-t{font-size:17px;font-weight:800;}
.tb-s{font-size:11px;color:var(--mut);margin-top:1px;display:flex;align-items:center;gap:5px;}
.pls{width:7px;height:7px;border-radius:50%;background:var(--grn);animation:pls 2s infinite;flex-shrink:0;}
@keyframes pls{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
select.sel{background:var(--surf2);border:1px solid var(--brd);color:var(--txt);padding:7px 12px;border-radius:8px;font-size:12px;cursor:pointer;outline:none;}
.btn{padding:7px 15px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:700;transition:.15s;display:inline-flex;align-items:center;gap:6px;font-family:inherit;white-space:nowrap;}
.bp{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;}
.bp:hover{opacity:.85;}
.bg{background:transparent;border:1px solid var(--brd);color:var(--mut);}
.bg:hover{border-color:var(--acc);color:var(--acc);}
.bsm{padding:5px 11px;font-size:12px;}
.bgrn{background:var(--grn);color:#000;}
.bred{background:var(--red);color:#fff;}
.bpur{background:var(--acc2);color:#fff;}
.content{padding:20px 22px;flex:1;}
/* KPI */
.kgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px;}
.kc{background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:16px;position:relative;overflow:hidden;transition:.2s;}
.kc:hover{transform:translateY(-2px);border-color:rgba(0,229,255,.3);}
.kc::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--acc),var(--acc2));opacity:0;transition:.2s;}
.kc:hover::after{opacity:1;}
.kc-i{font-size:20px;margin-bottom:8px;}
.kc-l{font-size:9px;color:var(--mut);letter-spacing:.5px;text-transform:uppercase;}
.kc-v{font-size:20px;font-weight:800;margin:3px 0;letter-spacing:-1px;}
.kc-s{font-size:10px;color:var(--mut);}
.g2{display:grid;grid-template-columns:1.6fr 1fr;gap:14px;margin-bottom:14px;}
.card{background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:18px;}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.ct{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;}
.cdot{width:6px;height:6px;border-radius:50%;}
.cbadge{font-size:10px;padding:3px 8px;border-radius:99px;background:rgba(0,229,255,.1);color:var(--acc);border:1px solid rgba(0,229,255,.2);}
/* TABLA */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:700px;}
th{text-align:left;padding:8px 10px;font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--mut);border-bottom:1px solid var(--brd);}
td{padding:9px 10px;border-bottom:1px solid rgba(26,45,80,.4);vertical-align:middle;}
tr:last-child td{border:none;}
tr:hover td{background:rgba(0,229,255,.02);}
/* CHIPS */
.chip{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700;}
.cg{background:rgba(0,200,83,.15);color:var(--grn);}
.cr{background:rgba(255,23,68,.15);color:var(--red);}
.cy{background:rgba(255,215,64,.15);color:var(--ylw);}
.cb{background:rgba(0,229,255,.15);color:var(--acc);}
.cp{background:rgba(123,95,255,.15);color:var(--acc2);}
/* SERVICIOS */
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.si{background:var(--surf2);border:1px solid var(--brd);border-radius:9px;padding:11px;}
.si-n{font-size:9px;color:var(--mut);letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px;}
.si-v{font-size:15px;font-weight:800;}
.si-s{font-size:10px;color:var(--mut);margin-top:1px;}
/* MODAL */
.mb{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:flex-start;justify-content:center;z-index:1000;backdrop-filter:blur(4px);overflow-y:auto;padding:20px;}
.mo{background:var(--surf);border:1px solid var(--brd);border-radius:14px;padding:24px;width:540px;max-width:100%;box-shadow:0 24px 64px rgba(0,0,0,.6);margin:auto;}
.mo-t{font-size:16px;font-weight:800;margin-bottom:18px;}
/* FORM */
.fg{margin-bottom:13px;}
.fl{font-size:10px;font-weight:700;color:var(--mut);letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:5px;}
.fi{width:100%;background:var(--surf2);border:1px solid var(--brd);color:var(--txt);padding:9px 12px;border-radius:7px;font-size:14px;outline:none;transition:.15s;font-family:inherit;}
.fi:focus{border-color:var(--acc);}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fa{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap;}
/* DETALLE LINEA FACTURA - etiquetas claras */
.det-row{display:grid;grid-template-columns:1fr 110px 130px 36px;gap:8px;margin-bottom:8px;align-items:end;}
.det-lbl{font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
/* UPLOAD */
.uz{border:2px dashed var(--brd);border-radius:10px;padding:22px;text-align:center;cursor:pointer;transition:.2s;position:relative;overflow:hidden;background:var(--surf2);}
.uz:hover,.uz.drag{border-color:var(--acc);background:rgba(0,229,255,.05);}
.uz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.cpv{border:1px solid var(--brd);border-radius:10px;overflow:hidden;}
.cpv img{width:100%;max-height:200px;object-fit:contain;background:var(--surf2);display:block;}
.cpvb{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(0,229,255,.06);border-top:1px solid var(--brd);}
.cpvn{font-size:12px;color:var(--acc);font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cpvx{background:none;border:none;color:var(--red);cursor:pointer;font-size:13px;padding:0 0 0 8px;}
.compbtn{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:700;background:rgba(0,229,255,.12);color:var(--acc);cursor:pointer;border:1px solid rgba(0,229,255,.2);}
.compbtn:hover{background:rgba(0,229,255,.25);}
/* LIGHTBOX */
.lbox{position:fixed;inset:0;background:rgba(0,0,0,.94);display:flex;align-items:center;justify-content:center;z-index:2000;}
.lbox img{max-width:90vw;max-height:88vh;border-radius:10px;}
.lbox-x{position:fixed;top:16px;right:20px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:18px;cursor:pointer;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;}
/* RANKING */
.rr{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid rgba(26,45,80,.3);}
.rr:last-child{border:none;}
.rn{width:26px;height:26px;border-radius:50%;background:var(--surf2);border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--mut);flex-shrink:0;}
.rn.top{background:linear-gradient(135deg,var(--acc2),var(--acc));border:none;color:#fff;}
.pb{height:5px;border-radius:99px;background:var(--surf2);flex:1;overflow:hidden;}
.pf{height:100%;border-radius:99px;}
.pred{background:linear-gradient(135deg,rgba(123,95,255,.12),rgba(0,229,255,.08));border:1px solid rgba(123,95,255,.25);border-radius:10px;padding:13px;margin-bottom:9px;}
/* DETALLE FACTURA MODAL */
.det-tabla{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px;}
.det-tabla th{text-align:left;padding:7px 10px;font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;border-bottom:1px solid var(--brd);}
.det-tabla td{padding:8px 10px;border-bottom:1px solid rgba(26,45,80,.3);}
.det-tabla tr:last-child td{border:none;}
/* TOAST */
.toast{position:fixed;bottom:18px;right:18px;z-index:9999;padding:11px 18px;border-radius:9px;font-size:13px;font-weight:700;box-shadow:0 8px 30px rgba(0,0,0,.4);}
/* ALERT */
.al{border-radius:9px;padding:10px 14px;margin-bottom:12px;font-size:12px;display:flex;align-items:flex-start;gap:8px;}
.aly{background:rgba(255,215,64,.1);border:1px solid rgba(255,215,64,.3);color:var(--ylw);}
.alr{background:rgba(255,23,68,.1);border:1px solid rgba(255,23,68,.3);color:var(--red);}
/* RESPONSIVE */
@media(max-width:768px){
  .sb{width:0;min-width:0;overflow:hidden;border:none;position:fixed;z-index:50;transition:.25s;}
  .sb.open{width:210px;min-width:210px;box-shadow:4px 0 20px rgba(0,0,0,.6);}
  .main{width:100%;}
  .kgrid{grid-template-columns:repeat(2,1fr);}
  .g2{grid-template-columns:1fr;}
  .sg{grid-template-columns:repeat(2,1fr);}
  .content{padding:12px;}
  .topbar{padding:10px 14px;}
  .det-row{grid-template-columns:1fr 80px 100px 30px;gap:5px;}
  .mo{padding:18px;}
  .hamburger{display:flex!important;}
  table{min-width:600px;}
}
.hamburger{display:none;align-items:center;justify-content:center;width:34px;height:34px;background:var(--surf2);border:1px solid var(--brd);border-radius:8px;cursor:pointer;font-size:16px;flex-shrink:0;}
.overlay{display:none;position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.5);}
.overlay.show{display:block;}
</style>
</head>
<body>
<div id="app">
  <div class="ldf"><div class="sp"></div><div style="color:var(--mut);font-size:13px;">Iniciando Knox Ventas...</div></div>
</div>
<script>
// ── CONFIG ────────────────────────────────────────────────────
var SURL='https://aivugnevyzoutrvqmrvd.supabase.co';
var SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpdnVnbmV2eXpvdXRydnFtcnZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMjEwMjAsImV4cCI6MjA5MDg5NzAyMH0.0GPAB7-M2wTLHYOllaUT1_hSPgLo63NTQVADrqz-qJw';

var SVCS_DEF=[
  {id:1,codigo:'GPS_J16',   nombre:'GPS J16',          color:'#00e5ff'},
  {id:2,codigo:'GPS_D11',   nombre:'GPS D11',          color:'#7b5fff'},
  {id:3,codigo:'MARCA_BL',  nombre:'MARCA BLANCA',     color:'#00c853'},
  {id:4,codigo:'NUEVAS_UNI',nombre:'NUEVAS UNIDADES',  color:'#ffd740'},
  {id:5,codigo:'RENOV_UNI', nombre:'RENOV. UNIDADES',  color:'#ff6d00'},
  {id:6,codigo:'RENOV_SIM', nombre:'RENOV. SIM',       color:'#f50057'},
  {id:7,codigo:'NUEVOS_SIM',nombre:'NUEVOS SIM',       color:'#69f0ae'},
  {id:8,codigo:'AUM_DATA',  nombre:'AUMENTO DATA',     color:'#40c4ff'},
  {id:9,codigo:'PLASTIC_S', nombre:'PLASTICO SIM',     color:'#ea80fc'},
];

var MN=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
function ml(k){try{var p=k.split('-');return MN[parseInt(p[1])]+' '+p[0].slice(2);}catch(e){return k;}}
function td(){return new Date().toISOString().split('T')[0];}
function perActual(){return new Date().toISOString().slice(0,7);}
function periodos(){
  var list=[];var now=new Date();
  for(var i=6;i>=0;i--){
    var d=new Date(now.getFullYear(),now.getMonth()-i,1);
    list.push(d.getFullYear()+'-'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1));
  }
  return list;
}
var fmt=function(n){return 'RD$'+Math.round(n||0).toLocaleString('es-DO');};
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── HEADERS ───────────────────────────────────────────────────
function sh(){
  var h={'Content-Type':'application/json','apikey':SKEY,'Prefer':'return=representation'};
  if(S.tok)h['Authorization']='Bearer '+S.tok;
  return h;
}

// ── DB ────────────────────────────────────────────────────────
var DB={
  get:function(table,sel,filters){
    sel=sel||'*';filters=filters||{};
    var url=SURL+'/rest/v1/'+table+'?select='+encodeURIComponent(sel)+'&limit=1000&order=id.desc';
    Object.keys(filters).forEach(function(k){url+='&'+k+'=eq.'+encodeURIComponent(filters[k]);});
    return fetch(url,{headers:sh()}).then(function(r){
      return r.json().then(function(d){if(!r.ok)throw new Error(JSON.stringify(d));return d;});
    });
  },
  post:function(table,body){
    return fetch(SURL+'/rest/v1/'+table,{method:'POST',headers:sh(),body:JSON.stringify(body)})
    .then(function(r){return r.json().then(function(d){if(!r.ok)throw new Error(JSON.stringify(d));return Array.isArray(d)?d[0]:d;});});
  },
  patch:function(table,id,body){
    return fetch(SURL+'/rest/v1/'+table+'?id=eq.'+id,{method:'PATCH',headers:sh(),body:JSON.stringify(body)})
    .then(function(r){return r.json().then(function(d){if(!r.ok)throw new Error(JSON.stringify(d));return Array.isArray(d)?d[0]:d;});});
  },
  del:function(table,id){
    return fetch(SURL+'/rest/v1/'+table+'?id=eq.'+id,{method:'DELETE',headers:sh()})
    .then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error(t);});});
  },
  login:function(email,pass){
    return fetch(SURL+'/auth/v1/token?grant_type=password',{
      method:'POST',headers:{'Content-Type':'application/json','apikey':SKEY},
      body:JSON.stringify({email:email,password:pass})
    }).then(function(r){return r.json();});
  },
  // STORAGE — usa upsert para que no falle si ya existe
  upload:function(path,file){
    return fetch(SURL+'/storage/v1/object/comprobantes/'+path,{
      method:'POST',
      headers:{'apikey':SKEY,'Authorization':'Bearer '+S.tok,'x-upsert':'true'},
      body:file
    }).then(function(r){
      if(!r.ok)return r.text().then(function(t){console.warn('Upload error:',t);return null;});
      return SURL+'/storage/v1/object/public/comprobantes/'+path;
    }).catch(function(e){console.warn('Upload catch:',e);return null;});
  }
};

// ── STATE ─────────────────────────────────────────────────────
var S={
  tok:null,user:null,
  sec:'dash',per:perActual(),
  cls:[],fcs:[],svcs:[],dets:{},
  modal:null,toast:null,
  mFiltro:'todas',cFiltro:'todos',
  // form nueva factura — guardado en state para no perder al re-render
  fForm:{ci:'',tp:'Mensual',fe:td(),dets:[{si:'',q:'1',p:''}]},
  cForm:{n:'',e:'',em:'',tl:'',st:'Activo'},
  editC:null,pagarF:null,
  pFecha:td(),pFile:null,pFileName:'',pPreview:null,
  lbox:null,
  verFac:null,   // factura cuyo detalle se está viendo
  sbOpen:false,
};

// ── RENDER ────────────────────────────────────────────────────
function R(){
  var app=document.getElementById('app');
  if(!app)return;
  try{
    if(!S.user){app.innerHTML=rLogin();bLogin();return;}
    app.innerHTML=rApp();
    bApp();
    if(S.sec==='dash')setTimeout(initCharts,80);
    if(S.toast){clearTimeout(window._tt);window._tt=setTimeout(function(){S.toast=null;R();},3000);}
  }catch(e){
    console.error(e);
    app.innerHTML='<div class="ldf"><div style="font-size:36px">⚠️</div><div style="color:var(--red);font-weight:700;">'+e.message+'</div><button onclick="location.reload()" class="btn bp" style="margin-top:14px;">🔄 Recargar</button></div>';
  }
}

// ── LOGIN ─────────────────────────────────────────────────────
function rLogin(){
  return '<div class="lp"><div class="lc">'+
  '<div style="text-align:center;margin-bottom:26px;">'+
  '<div style="font-size:26px;font-weight:800;background:linear-gradient(90deg,#00e5ff,#7b5fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Knox Ventas</div>'+
  '<div style="font-size:10px;color:var(--mut);letter-spacing:2px;margin-top:3px;">GPS MONITORING SYSTEM</div>'+
  '<div style="font-size:10px;color:var(--mut);margin-top:2px;">by Jefferson Morillo</div></div>'+
  '<div id="lerr"></div>'+
  '<div class="fg"><label class="fl">EMAIL</label><input class="fi" id="lem" type="email" placeholder="tu@email.com" autocomplete="email"></div>'+
  '<div class="fg"><label class="fl">CONTRASEÑA</label><input class="fi" id="lps" type="password" placeholder="••••••••" autocomplete="current-password"></div>'+
  '<button class="btn bp" id="lbtn" style="width:100%;justify-content:center;padding:12px;">🔐 Iniciar Sesión</button>'+
  '<div style="margin-top:12px;font-size:11px;color:var(--mut);text-align:center;">Email y contraseña creados en Supabase → Authentication → Users</div>'+
  '</div></div>';
}
function bLogin(){
  var go=function(){
    var em=document.getElementById('lem').value.trim();
    var ps=document.getElementById('lps').value;
    var ee=document.getElementById('lerr');
    var btn=document.getElementById('lbtn');
    if(!em||!ps){ee.innerHTML='<div class="al alr">⚠️ Ingresa email y contraseña</div>';return;}
    btn.textContent='Verificando...';btn.disabled=true;ee.innerHTML='';
    DB.login(em,ps).then(function(res){
      if(res&&res.access_token){
        S.tok=res.access_token;
        S.user={n:em.split('@')[0],r:'Admin',em:em};
        cargar().then(R);
      }else{
        var msg=(res&&(res.error_description||res.error))||'Credenciales incorrectas';
        ee.innerHTML='<div class="al alr">⚠️ '+msg+'</div>';
        btn.textContent='Iniciar Sesión';btn.disabled=false;
      }
    }).catch(function(e){
      ee.innerHTML='<div class="al alr">⚠️ Error de red: '+e.message+'</div>';
      btn.textContent='Iniciar Sesión';btn.disabled=false;
    });
  };

// ── CARGAR DATOS ──────────────────────────────────────────────
function cargar(){
  return Promise.all([
    DB.get('clientes').then(function(d){S.cls=d||[];}).catch(function(){S.cls=[];}),
    DB.get('servicios').then(function(d){S.svcs=d&&d.length?d:SVCS_DEF;}).catch(function(){S.svcs=SVCS_DEF;}),
    cargarFacturas()
  ]);
}

function cargarFacturas(){
  return DB.get('facturas','*,clientes(nombre,empresa)',{periodo_servicio:S.per})
  .then(function(fcs){
    S.fcs=fcs||[];
    // Cargar detalles de todas las facturas del período
    if(!S.fcs.length)return;
    var ids=S.fcs.map(function(f){return f.id;});
    // Consultar detalles en lote usando IN
    var url=SURL+'/rest/v1/factura_detalles?select=*,servicios(nombre,codigo)&factura_id=in.('+ids.join(',')+')'+'&apikey='+SKEY;
    return fetch(url,{headers:sh()}).then(function(r){return r.json();}).then(function(dets){
      S.dets={};
      (dets||[]).forEach(function(d){
        if(!S.dets[d.factura_id])S.dets[d.factura_id]=[];
        S.dets[d.factura_id].push(d);
      });
    }).catch(function(){S.dets={};});
  }).catch(function(){S.fcs=[];S.dets={};});
}

// ── DASHBOARD ─────────────────────────────────────────────────
function calcK(){
  var f=S.fcs;
  var cm={};S.cls.forEach(function(c){cm[c.id]=c;});
  var tot=f.reduce(function(s,x){return s+(parseFloat(x.total)||0);},0);
  var pag=f.filter(function(x){return x.estado==='Pagada';}).length;
  var cob=f.filter(function(x){return x.estado==='Pagada';}).reduce(function(s,x){return s+(parseFloat(x.total)||0);},0);
  var pct=f.length?Math.round(pag*100/f.length):0;
  var act=f.filter(function(x){var c=cm[x.cliente_id];return c&&c.estado==='Activo';});
  var pA=act.filter(function(x){return x.estado==='Pendiente';}).length;
  var mor=act.length?Math.round(pA*100/act.length):0;
  var nm=S.cls.filter(function(c){return !c.es_general&&c.creado_en&&c.creado_en.substring(0,7)===S.per;}).length;
  return{tot:tot,cob:cob,pend:tot-cob,pct:pct,mor:mor,nm:nm,totF:f.length,pag:pag};
}

// Calcular ingresos reales por servicio desde los detalles cargados
function calcSvc(){
  var map={};
  var svcs=S.svcs.length?S.svcs:SVCS_DEF;
  svcs.forEach(function(s){map[s.codigo]={nombre:s.nombre,color:null,q:0,tot:0,cob:0};});
  SVCS_DEF.forEach(function(s){if(map[s.codigo])map[s.codigo].color=s.color;});
  // Recorrer detalles de todas las facturas del período
  S.fcs.forEach(function(fac){
    var dets=S.dets[fac.id]||[];
    dets.forEach(function(d){
      var cod=d.servicios&&d.servicios.codigo?d.servicios.codigo:'';
      if(!map[cod])return;
      map[cod].q+=(parseInt(d.cantidad)||0);
      map[cod].tot+=(parseFloat(d.subtotal)||0);
      if(fac.estado==='Pagada')map[cod].cob+=(parseFloat(d.subtotal)||0);
    });
  });
  return map;
}

    var c=cm[f.cliente_id];if(!c||c.estado!=='Activo'||c.es_general)return;

  });

    var tot=ff.reduce(function(s,f){return s+(parseFloat(f.total)||0);},0);
    var pag=ff.filter(function(f){return f.estado==='Pagada';}).reduce(function(s,f){return s+(parseFloat(f.total)||0);},0);
    var pct=tot>0?Math.round(pag*100/tot):0;
    return{c:c,tot:tot,pag:pag,pct:pct};
  }).sort(function(a,b){return b.pct-a.pct;});
  var ri=ranking.length===0?'<div style="text-align:center;padding:22px;color:var(--mut);">Sin datos todavía</div>':
  ranking.map(function(r,i){

    '<div style="text-align:right;"><div style="font-weight:800;font-size:13px;color:var(--acc);">'+fmt(r.pag)+'</div><div style="font-size:10px;color:var(--mut);">de '+fmt(r.tot)+'</div></div></div>';
  }).join('');
  var ia=ranking.filter(function(r){return r.pct<60;});
  var iH=ia.length===0?'<div style="text-align:center;padding:22px;color:var(--grn);font-weight:700;">✨ Todos con buen historial</div>':
  ia.map(function(r){return '<div class="pred"><div style="display:flex;justify-content:space-between;align-items:center;"><div><div style="font-weight:700;font-size:13px;">'+esc(r.c.nombre)+'</div><div style="font-size:11px;color:var(--mut);">'+esc(r.c.empresa||'')+'</div></div><span class="chip cr">'+r.pct+'%</span></div><div style="font-size:12px;color:var(--mut);margin-top:7px;">'+(r.pct<30?'🔴 Alto riesgo — seguimiento urgente':r.pct<50?'🟡 Riesgo moderado':'🔵 Riesgo leve')+'</div></div>';}).join('');
  return '<div class="g2"><div class="card"><div class="ch"><div class="ct">🏆 Ranking</div></div>'+ri+'</div>'+
  '<div class="card"><div class="ch"><div class="ct">🤖 Predicción IA</div></div>'+iH+'</div></div>';

  scales:{x:{grid:{color:'rgba(26,45,80,.4)'},ticks:{color:'#607d9f',font:{size:12}}},y:{grid:{color:'rgba(26,45,80,.4)'},ticks:{color:'#607d9f',font:{size:10},callback:function(v){return 'RD$'+v.toLocaleString();}}}}}});

  // periodo
  var psel=document.getElementById('psel');
  if(psel)psel.onchange=function(){
    S.per=psel.value;
    cargarFacturas().then(R).catch(R);
  };
  // salir
  var bo=document.getElementById('btnOut');if(bo)bo.onclick=function(){S.tok=null;S.user=null;S.cls=[];S.fcs=[];S.svcs=[];S.dets={};R();};
  // filtros
  document.querySelectorAll('[data-filtro]').forEach(function(b){b.onclick=function(){S.mFiltro=b.dataset.filtro;R();};});
  document.querySelectorAll('[data-cf]').forEach(function(b){b.onclick=function(){S.cFiltro=b.dataset.cf;R();};});

  var bnm=document.getElementById('btnNM');if(bnm)bnm.onclick=function(){S.modal={tp:'fac'};S.fForm={ci:'',tp:'Mensual',fe:td(),dets:[{si:'',q:'1',p:''}]};R();};
  var bnd=document.getElementById('btnND');if(bnd)bnd.onclick=function(){S.modal={tp:'fac'};S.fForm={ci:'',tp:'Directa',fe:td(),dets:[{si:'',q:'1',p:''}]};R();};
  // pagar
  document.querySelectorAll('[data-pagar]').forEach(function(b){
    b.onclick=function(){
      S.pagarF=S.fcs.find(function(f){return f.id===+b.dataset.pagar;});
      S.pFecha=td();S.pFile=null;S.pFileName='';S.pPreview=null;
      S.modal={tp:'pag'};R();
    };
  });
  // ver detalle
  document.querySelectorAll('[data-ver]').forEach(function(b){
    b.onclick=function(){
      var fac=S.fcs.find(function(f){return f.id===+b.dataset.ver;});
      S.verFac=fac;S.modal={tp:'det'};R();
    };
  });
  // lightbox
  document.querySelectorAll('[data-lb]').forEach(function(b){b.onclick=function(){S.lbox=b.dataset.lb;R();};});
  var lboxEl=document.getElementById('lboxEl');
  if(lboxEl){lboxEl.onclick=function(e){if(e.target===lboxEl||e.target.tagName==='IMG'){S.lbox=null;R();}};var lx=document.getElementById('lboxX');if(lx)lx.onclick=function(){S.lbox=null;R();};}
  // clientes
  var bnc=document.getElementById('btnNC');if(bnc)bnc.onclick=function(){S.editC=null;S.cForm={n:'',e:'',em:'',tl:'',st:'Activo'};S.modal={tp:'cli'};R();};
  document.querySelectorAll('[data-edit]').forEach(function(b){
    b.onclick=function(){
      var c=S.cls.find(function(x){return x.id===+b.dataset.edit;});
      S.editC=c;S.cForm={n:c.nombre,e:c.empresa||'',em:c.email||'',tl:c.telefono||'',st:c.estado};
      S.modal={tp:'cli'};R();
    };
  });
  document.querySelectorAll('[data-del]').forEach(function(b){
    b.onclick=function(){
      if(!confirm('¿Eliminar este cliente?'))return;
      DB.del('clientes',+b.dataset.del).then(function(){return DB.get('clientes');}).then(function(d){S.cls=d||[];S.toast={m:'🗑️ Cliente eliminado',c:'var(--ylw)'};R();}).catch(function(e){alert('Error: '+e.message);});

function bModal(){
  var mbg=document.getElementById('mbg');if(mbg)mbg.onclick=function(e){if(e.target===mbg){S.modal=null;S.pPreview=null;R();}};
  var can=document.getElementById('moCan');if(can)can.onclick=function(){S.modal=null;S.pPreview=null;R();};
  var save=document.getElementById('moSave');if(!save||!S.modal)return;

  // ── FACTURA — leer valores del DOM sin re-render al tipear ──
  if(S.modal.tp==='fac'){
    // cambio tipo
    document.querySelectorAll('[data-ftp]').forEach(function(b){b.onclick=function(){
      guardarFormFac();S.fForm.tp=b.dataset.ftp;R();
    };});
    // cambio servicio (re-render necesario para calcular total)
    document.querySelectorAll('[data-dsi]').forEach(function(el){el.onchange=function(){
      guardarFormFac();S.fForm.dets[+el.dataset.dsi].si=+el.value;R();
    };});
    // CANTIDAD y PRECIO — solo actualizar state en input, NO re-render
    document.querySelectorAll('[data-drem]').forEach(function(b){b.onclick=function(){
      guardarFormFac();S.fForm.dets.splice(+b.dataset.drem,1);if(!S.fForm.dets.length)S.fForm.dets.push({si:'',q:'1',p:''});R();
    };});
    var ad=document.getElementById('addDet');if(ad)ad.onclick=function(){
      guardarFormFac();S.fForm.dets.push({si:'',q:'1',p:''});R();
    };
    var mfCi=document.getElementById('mfCi');if(mfCi)mfCi.onchange=function(){S.fForm.ci=mfCi.value;};
    var mfFe=document.getElementById('mfFe');if(mfFe)mfFe.onchange=function(){S.fForm.fe=mfFe.value;};

    // Actualizar total visualmente sin re-render completo
    var updateTotal=function(){
      var tot=0;
      S.fForm.dets.forEach(function(d,i){
        var qEl=document.getElementById('dq'+i);var pEl=document.getElementById('dp'+i);
        var q=qEl?parseFloat(qEl.value)||0:0;
        var p=pEl?parseFloat(pEl.value)||0:0;
        tot+=q*p;
        // actualizar subtotal de la línea sin re-render
        var sub=pEl&&pEl.parentElement&&pEl.parentElement.parentElement&&pEl.parentElement.parentElement.nextElementSibling;
      });
      var tv=document.querySelector('[data-total-display]');if(tv)tv.textContent=fmt(tot);
    };

    save.onclick=function(){
      guardarFormFac();
      var f=S.fForm;
      if(!f.ci||!f.fe){alert('Selecciona cliente y fecha de emisión');return;}
      if(f.dets.some(function(d){return !d.si;})){alert('Selecciona el servicio en cada línea');return;}
      save.textContent='Guardando...';save.disabled=true;
      var periodo=f.fe.substring(0,7);
      var num='KNX-'+Date.now().toString().slice(-6);
      DB.post('facturas',{cliente_id:+f.ci,numero_factura:num,tipo_factura:f.tp,fecha_emision:f.fe,periodo_servicio:periodo,estado:'Pendiente',total:0})
      .then(function(fac){
        var proms=f.dets.map(function(d){
          return DB.post('factura_detalles',{factura_id:fac.id,servicio_id:+d.si,cantidad:parseInt(d.q)||1,precio_unitario:parseFloat(d.p)||0});
        });
        return Promise.all(proms);
      }).then(function(){return cargarFacturas();}).then(function(){
        S.modal=null;S.toast={m:'✅ Factura '+num+' guardada',c:'var(--grn)'};R();
      }).catch(function(e){alert('Error al guardar: '+e.message);save.textContent='💾 Guardar Factura';save.disabled=false;});
    };
  }

  // ── PAGAR ──
  if(S.modal.tp==='pag'){
    var pFe=document.getElementById('pFe');if(pFe)pFe.onchange=function(){S.pFecha=pFe.value;};
    var loadF=function(file){
      if(!file)return;
      if(file.size>10*1024*1024){alert('Máximo 10MB');return;}
      S.pFile=file;S.pFileName=file.name;
      var reader=new FileReader();
      reader.onload=function(e){S.pPreview=e.target.result;R();bModal();};
      reader.readAsDataURL(file);
    };
    var cfi=document.getElementById('cmpFile');if(cfi)cfi.onchange=function(){loadF(cfi.files[0]);};
    var uzn=document.getElementById('uzn');
    if(uzn){
      uzn.ondragover=function(e){e.preventDefault();uzn.classList.add('drag');};
      uzn.ondragleave=function(){uzn.classList.remove('drag');};
      uzn.ondrop=function(e){e.preventDefault();uzn.classList.remove('drag');loadF(e.dataTransfer.files[0]);};
    }
    var rc=document.getElementById('remComp');if(rc)rc.onclick=function(){S.pFile=null;S.pFileName='';S.pPreview=null;R();bModal();};
    save.onclick=function(){
      var fecha=document.getElementById('pFe')?document.getElementById('pFe').value:td();
      save.textContent='Guardando...';save.disabled=true;
      var doUpdate=function(urlComp){
        DB.patch('facturas',S.pagarF.id,{estado:'Pagada',fecha_pago:fecha,url_comprobante:urlComp||null,actualizado_en:new Date().toISOString()})
        .then(function(){return cargarFacturas();})
        .then(function(){
          S.modal=null;S.pPreview=null;
          S.toast={m:'✅ Pago registrado'+(urlComp?' · Comprobante guardado 🖼️':''),c:'var(--grn)'};R();
        }).catch(function(e){alert('Error: '+e.message);save.textContent='✅ Confirmar Pago';save.disabled=false;});
      };
      if(S.pFile){
        var ext=S.pFile.name.split('.').pop().toLowerCase();
        var path=esc(S.pagarF.numero_factura)+'_'+Date.now()+'.'+ext;
        DB.upload(path,S.pFile).then(function(url){
          if(!url){alert('No se pudo subir el comprobante al storage.\n\nVerifica en Supabase → Storage → Policies que el bucket "comprobantes" tenga política de INSERT para usuarios autenticados.\n\nEl pago se guardará sin comprobante.');doUpdate(null);}
          else doUpdate(url);
        });
      }else{doUpdate(null);}
    };
  }

  // ── CLIENTE ──
  if(S.modal.tp==='cli'){
    document.querySelectorAll('[data-cst]').forEach(function(b){b.onclick=function(){S.cForm.st=b.dataset.cst;R();};});
    save.onclick=function(){
      var n=document.getElementById('cN')?document.getElementById('cN').value.trim():'';
      if(!n){alert('El nombre es obligatorio');return;}
      save.textContent='Guardando...';save.disabled=true;
      var body={nombre:n,empresa:document.getElementById('cE').value||null,email:document.getElementById('cEm').value||null,telefono:document.getElementById('cTl').value||null,estado:S.cForm.st};
      var p=S.editC?DB.patch('clientes',S.editC.id,body):DB.post('clientes',body);
      p.then(function(){return DB.get('clientes');}).then(function(d){
        S.cls=d||[];S.modal=null;
        S.toast={m:S.editC?'✅ Cliente actualizado':'✅ Cliente creado',c:'var(--grn)'};R();
      }).catch(function(e){alert('Error: '+e.message);save.textContent='💾 Guardar';save.disabled=false;});
    };
  }
}

// Leer valores actuales de los inputs del form sin re-render
function guardarFormFac(){
  var mfCi=document.getElementById('mfCi');if(mfCi)S.fForm.ci=mfCi.value;
  var mfFe=document.getElementById('mfFe');if(mfFe)S.fForm.fe=mfFe.value;
  S.fForm.dets.forEach(function(d,i){

<script>
// ─────────────────────────────────────────────────────────────
// SUPABASE CLIENT (sin dependencias — usando fetch nativo)
// ─────────────────────────────────────────────────────────────
const supa={
  async from(table){
    return new SupaQuery(table);
  },
  async rpc(fn,params={}){
    const r=await fetch(`${SUPA_URL}/rest/v1/rpc/${fn}`,{
      method:'POST',
      headers:supaHeaders(),
      body:JSON.stringify(params)
    });
    return r.json();
  },
  async signIn(email,password){
    const r=await fetch(`${SUPA_URL}/auth/v1/token?grant_type=password`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPA_KEY},
      body:JSON.stringify({email,password})
    });
    return r.json();
  },
  async signUp(email,password,nombre){
    const r=await fetch(`${SUPA_URL}/auth/v1/signup`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPA_KEY},
      body:JSON.stringify({email,password,data:{nombre}})
    });
    return r.json();
  }
};

function supaHeaders(){
  const h={'Content-Type':'application/json','apikey':SUPA_KEY,'Prefer':'return=representation'};
  if(S.token) h['Authorization']=`Bearer ${S.token}`;
  return h;
}

class SupaQuery{
  constructor(table){this.table=table;this._filters=[];this._select='*';this._order=null;this._limit=null;}
  select(cols){this._select=cols;return this;}
  eq(col,val){this._filters.push(`${col}=eq.${val}`);return this;}
  order(col,{ascending=true}={}){this._order=`${col}.${ascending?'asc':'desc'}`;return this;}
  limit(n){this._limit=n;return this;}
  async get(){
    let url=`${SUPA_URL}/rest/v1/${this.table}?select=${this._select}`;
    this._filters.forEach(f=>url+=`&${f}`);
    if(this._order) url+=`&order=${this._order}`;
    if(this._limit) url+=`&limit=${this._limit}`;
    const r=await fetch(url,{headers:supaHeaders()});
    const data=await r.json();
    return{data,error:r.ok?null:data};
  }
  async insert(body){
    const r=await fetch(`${SUPA_URL}/rest/v1/${this.table}`,{method:'POST',headers:supaHeaders(),body:JSON.stringify(body)});
    const data=await r.json();
    return{data:Array.isArray(data)?data[0]:data,error:r.ok?null:data};
  }
  async update(body){
    let url=`${SUPA_URL}/rest/v1/${this.table}?`;
    this._filters.forEach((f,i)=>url+=(i?'&':'')+f);
    const r=await fetch(url,{method:'PATCH',headers:supaHeaders(),body:JSON.stringify(body)});
    const data=await r.json();
    return{data:Array.isArray(data)?data[0]:data,error:r.ok?null:data};
  }
  async delete(){
    let url=`${SUPA_URL}/rest/v1/${this.table}?`;
    this._filters.forEach((f,i)=>url+=(i?'&':'')+f);
    const r=await fetch(url,{method:'DELETE',headers:supaHeaders()});
    return{error:r.ok?null:await r.json()};
  }
}

// ─────────────────────────────────────────────────────────────
// API HELPERS
// ─────────────────────────────────────────────────────────────
const API={
  // CLIENTES
  async getClientes(){
    const q=new SupaQuery('clientes');
    return (await q.order('creado_en',{ascending:false}).get()).data||[];
  },
  async crearCliente(data){
    const q=new SupaQuery('clientes');
    return q.insert({nombre:data.n,empresa:data.e||null,email:data.em||null,telefono:data.tl||null,estado:data.st});
  },
  async actualizarCliente(id,data){
    const q=new SupaQuery('clientes');
    return q.eq('id',id).update({nombre:data.n,empresa:data.e||null,email:data.em||null,telefono:data.tl||null,estado:data.st,actualizado_en:new Date().toISOString()});
  },
  async eliminarCliente(id){
    const q=new SupaQuery('clientes');
    return q.eq('id',id).delete();
  },
  // SERVICIOS
  async getServicios(){
    const q=new SupaQuery('servicios');
    return (await q.eq('activo','true').get()).data||[];
  },
  // FACTURAS
  async getFacturas(periodo){
    const q=new SupaQuery('facturas');
    q._select='*,clientes(nombre,empresa)';
    return (await q.eq('periodo_servicio',periodo).order('fecha_emision',{ascending:false}).get()).data||[];
  },
  async crearFactura(data){
    const q=new SupaQuery('facturas');
    const {data:fac,error}=await q.insert({
      cliente_id:data.clienteId,
      numero_factura:data.numero,
      tipo_factura:data.tipo,
      fecha_emision:data.fechaEmision,
      periodo_servicio:data.periodo,
      estado:'Pendiente',
      total:0,
      notas:data.notas||null
    });
    if(error||!fac) return{error};
    // insertar detalles
    for(const d of data.detalles){
      const qd=new SupaQuery('factura_detalles');
      await qd.insert({factura_id:fac.id,servicio_id:d.si,cantidad:d.q,precio_unitario:d.p});
    }
    return{data:fac};
  },
  async marcarPagada(id,fecha,urlComprobante){
    const q=new SupaQuery('facturas');
    return q.eq('id',id).update({estado:'Pagada',fecha_pago:fecha,url_comprobante:urlComprobante||null,actualizado_en:new Date().toISOString()});
  },
  // DETALLES de una factura
  async getDetalles(facturaId){
    const q=new SupaQuery('factura_detalles');
    q._select='*,servicios(nombre,codigo)';
    return (await q.eq('factura_id',facturaId).get()).data||[];
  },
  // KPI dashboard
  async getKpis(periodo){
    const r=await fetch(`${SUPA_URL}/rest/v1/facturas?periodo_servicio=eq.${periodo}&select=id,total,estado,cliente_id,clientes(estado)`,{headers:supaHeaders()});
    return await r.json();
  },
  // Subir imagen comprobante a Supabase Storage
  async subirComprobante(facturaNum,file){
    const ext=file.name.split('.').pop();
    const path=`comprobantes/${facturaNum}.${ext}`;
    const r=await fetch(`${SUPA_URL}/storage/v1/object/comprobantes/${path}`,{
      method:'POST',
      headers:{'apikey':SUPA_KEY,'Authorization':`Bearer ${S.token}`,'Content-Type':file.type},
      body:file
    });
    if(!r.ok) return null;
    return`${SUPA_URL}/storage/v1/object/public/comprobantes/${path}`;
  }
};

function renderLogin(){

<div style="text-align:center;margin-bottom:28px;">

function bindLogin(){
  const go=async()=>{
    const email=document.getElementById('lemail').value.trim();
    const pass=document.getElementById('lpass').value;
    if(!email||!pass){document.getElementById('lerr').innerHTML=`<div class="alert a-red">⚠️ Completa email y contraseña</div>`;return;}
    const lbtn=document.getElementById('lbtn');
    lbtn.textContent='Verificando...';lbtn.disabled=true;
    const res=await supa.signIn(email,pass);
    if(res.access_token){
      S.token=res.access_token;
      S.user={n:res.user?.user_metadata?.nombre||email,r:'Admin',email};
      await cargarDatosIniciales();
      render();
    }else{
      document.getElementById('lerr').innerHTML=`<div class="alert a-red">⚠️ ${res.error_description||'Credenciales incorrectas'}</div>`;
      lbtn.textContent='🔐 Iniciar Sesión';lbtn.disabled=false;
    }
  };
  document.getElementById('lbtn').onclick=go;
  document.getElementById('lpass').onkeydown=e=>{if(e.key==='Enter')go();};
}

async function cargarDatosIniciales(){
  S.cls=await API.getClientes();
  S.svcs=await API.getServicios();
  S.fcs=await API.getFacturas(S.per);
}

function generarPeriodos(){
  const periodos=[];
  const now=new Date();
  for(let i=6;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    periodos.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
  }
  return periodos;
}

function calcKpis(){
  const f=S.fcs;
  const cm=Object.fromEntries(S.cls.map(c=>[c.id,c]));
  const act=f.filter(x=>{const cl=cm[x.cliente_id]||x.clientes;return(cl?.estado||cl)!=='Suspendido';});
  const tot=f.reduce((s,x)=>s+(+x.total||0),0);
  const pag=f.filter(x=>x.estado==='Pagada').length;
  const cob=f.filter(x=>x.estado==='Pagada').reduce((s,x)=>s+(+x.total||0),0);
  const pct=f.length?Math.round(pag*100/f.length):0;
  const pendA=act.filter(x=>x.estado==='Pendiente').length;
  const mor=act.length?Math.round(pendA*100/act.length):0;
  const nm=S.cls.filter(c=>c.creado_en?.substring(0,7)===S.per&&!c.es_general).length;
  return{tot,cob,pend:tot-cob,pct,mor,nm,totF:f.length,pag};
}

function calcSvcMap(){
  const m={};
  S.fcs.forEach(fc=>{
    (fc._detalles||[]).forEach(d=>{
      const cod=d.servicios?.codigo||d.servicio_codigo||'';
      if(!m[cod])m[cod]={q:0,tot:0,cob:0};
      m[cod].q+=d.cantidad;
      m[cod].tot+=d.subtotal||0;
      if(fc.estado==='Pagada')m[cod].cob+=d.subtotal||0;
    });
  });
  return m;
}

<div class="mo-t">💳 Registrar Pago</div>
<div style="background:var(--surf2);border-radius:10px;padding:14px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--brd);">
  <div>
    <div style="font-size:11px;color:var(--mut);">Factura</div>
    <div style="font-weight:800;font-size:15px;color:var(--acc);">${f.numero_factura}</div>
    <div style="font-size:11px;color:var(--mut);margin-top:3px;">Período: <b style="color:var(--ylw);">${f.periodo_servicio}</b></div>
  </div>
  <div style="text-align:right;">
    <div style="font-size:11px;color:var(--mut);">Total</div>
    <div style="font-size:26px;font-weight:800;color:var(--grn);">${fmt(f.total)}</div>
  </div>
</div>
<div class="fg"><label class="fl">📅 FECHA DE PAGO</label><input class="fi" type="date" id="pFecha" value="${S.pFecha}"></div>
<div class="fg">
  <label class="fl">🖼️ COMPROBANTE / FOTO DEL PAGO</label>
  ${prev?`<div class="comp-preview">
    <img src="${prev}" alt="Comprobante">
    <div class="comp-preview-bar">
      <span class="comp-preview-name">📎 ${S.pCompName}</span>
      <button class="comp-remove" id="removeComp">✕ Quitar</button>
    </div>
  </div>`:`<div class="upload-zone" id="uploadZone">
    <input type="file" id="compFile" accept="image/png,image/jpeg,image/jpg,image/webp,application/pdf">
    <span style="font-size:28px;display:block;margin-bottom:8px;">📷</span>
    <div style="font-size:13px;color:var(--mut);"><b style="color:var(--acc);">Haz clic</b> o arrastra el comprobante aquí</div>
    <div style="font-size:11px;color:var(--mut);margin-top:4px;">PNG · JPG · PDF · máx 10MB</div>
  </div>`}
  <div style="font-size:11px;color:var(--mut);margin-top:6px;">El comprobante se guarda en la nube automáticamente.</div>
</div>
<div class="alert a-ylw">⚠️ El período <b>${f.periodo_servicio}</b> no cambia (regla contable de fecha emisión)</div>
<div class="fa">
  <button class="btn btn-g" id="moCan">Cancelar</button>
  <button class="btn btn-grn" id="moSave" style="min-width:160px;">✅ Confirmar Pago</button>
</div>
</div></div>`;
}

  const f=S.cForm;
  return`<div class="mb" id="mbg"><div class="mo">
<div class="mo-t">${S.editC?'✏️ Editar Cliente':'👤 Nuevo Cliente Master'}</div>
<div class="fr">
  <div class="fg"><label class="fl">NOMBRE</label><input class="fi" id="cN" value="${f.n}" placeholder="Nombre completo"></div>
  <div class="fg"><label class="fl">EMPRESA</label><input class="fi" id="cE" value="${f.e||''}"></div>
</div>
<div class="fr">
  <div class="fg"><label class="fl">EMAIL</label><input class="fi" type="email" id="cEm" value="${f.em||''}"></div>
  <div class="fg"><label class="fl">TELÉFONO</label><input class="fi" id="cTl" value="${f.tl||''}"></div>
</div>
<div class="fg"><label class="fl">ESTADO</label>
  <div style="display:flex;gap:8px;">

    <button class="btn btn-sm ${f.st==='Suspendido'?'':'btn-g'}" data-cst="Suspendido" style="flex:1;${f.st==='Suspendido'?'background:var(--red);color:#fff;':''}">🚫 Suspendido</button>
  </div>
</div>
<div class="fa">
  <button class="btn btn-g" id="moCan">Cancelar</button>

// ─────────────────────────────────────────────────────────────
// CHARTS
// ─────────────────────────────────────────────────────────────
function initCharts(){
  ['lineChart','donutChart'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){const i=Chart.getChart(el);if(i)i.destroy();}
  });
  const k=calcKpis();
  const lc=document.getElementById('lineChart');
  if(lc) new Chart(lc,{type:'bar',
    data:{labels:[ML(S.per)],datasets:[
      {label:'Facturado',data:[k.tot],backgroundColor:'rgba(0,229,255,.65)',borderRadius:6,barThickness:40},
      {label:'Cobrado',  data:[k.cob],backgroundColor:'rgba(0,200,83,.65)', borderRadius:6,barThickness:40},
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#607d9f',font:{size:11}}}},
      scales:{x:{grid:{color:'rgba(26,45,80,.4)'},ticks:{color:'#607d9f'}},
              y:{grid:{color:'rgba(26,45,80,.4)'},ticks:{color:'#607d9f',callback:v=>'RD$'+v.toLocaleString()}}}}});
  const dc=document.getElementById('donutChart');
  if(dc) new Chart(dc,{type:'doughnut',data:{labels:['Pagadas','Pendientes'],datasets:[{data:[k.pag,k.totF-k.pag],backgroundColor:['#00c853','#ff1744'],borderWidth:0,hoverOffset:4}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{display:false}}}});
}

// ─────────────────────────────────────────────────────────────
// BINDINGS
// ─────────────────────────────────────────────────────────────
function bindApp(){
  document.querySelectorAll('.ni').forEach(el=>el.onclick=async()=>{
    S.sec=el.dataset.sec;render();
  });
  const ps=document.getElementById('perSel');
  if(ps)ps.onchange=async e=>{
    S.per=e.target.value;
    S.fcs=await API.getFacturas(S.per);
    render();
  };
  document.getElementById('btnOut')?.onclick=()=>{S.user=null;S.token=null;S.cls=[];S.fcs=[];S.svcs=[];render();};
  document.querySelectorAll('[data-filtro]').forEach(b=>b.onclick=()=>{S.mFiltro=b.dataset.filtro;render();});
  document.querySelectorAll('[data-cfiltro]').forEach(b=>b.onclick=()=>{S.cFiltro=b.dataset.cfiltro;render();});
  document.getElementById('btnNM')?.onclick=()=>{S.modal={tp:'factura'};S.mForm={ci:'',tp:'Mensual',fe:td(),dets:[{si:'',q:1,p:0}]};render();};
  document.getElementById('btnND')?.onclick=()=>{S.modal={tp:'factura'};S.mForm={ci:'',tp:'Directa',fe:td(),dets:[{si:'',q:1,p:0}]};render();};
  document.querySelectorAll('[data-pagar]').forEach(b=>b.onclick=()=>{
    S.pagarF=S.fcs.find(f=>f.id===+b.dataset.pagar);
    S.pFecha=td();S.pCompFile=null;S.pCompName='';S.pCompPreview=null;
    S.modal={tp:'pagar'};render();
  });
  document.querySelectorAll('[data-lbox]').forEach(b=>b.onclick=()=>{S.lbox=b.dataset.lbox;render();});
  const lboxEl=document.getElementById('lboxEl');
  if(lboxEl){
    lboxEl.onclick=e=>{if(e.target===lboxEl||e.target.tagName==='IMG'){S.lbox=null;render();}};
    document.getElementById('lboxClose')?.onclick=()=>{S.lbox=null;render();};
  }
  document.getElementById('btnNC')?.onclick=()=>{S.editC=null;S.cForm={n:'',e:'',em:'',tl:'',st:'Activo'};S.modal={tp:'cliente'};render();};
  document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>{
    const c=S.cls.find(x=>x.id===+b.dataset.edit);
    S.editC=c;S.cForm={n:c.nombre,e:c.empresa||'',em:c.email||'',tl:c.telefono||'',st:c.estado};
    S.modal={tp:'cliente'};render();
  });
  document.querySelectorAll('[data-del]').forEach(b=>b.onclick=async()=>{
    if(!confirm('¿Eliminar este cliente?'))return;
    await API.eliminarCliente(+b.dataset.del);
    S.cls=await API.getClientes();
    toast('🗑️ Cliente eliminado','var(--ylw)');
  });
  bindModal();
}

function bindModal(){
  document.getElementById('mbg')?.onclick=e=>{if(e.target.id==='mbg'){S.modal=null;S.pCompPreview=null;render();}};
  document.getElementById('moCan')?.onclick=()=>{S.modal=null;S.pCompPreview=null;render();};
  const save=document.getElementById('moSave');
  if(!save||!S.modal)return;

  // FACTURA
  if(S.modal.tp==='factura'){
    document.querySelectorAll('[data-ftp]').forEach(b=>b.onclick=()=>{S.mForm.tp=b.dataset.ftp;render();});
    document.querySelectorAll('[data-dsi]').forEach(el=>el.onchange=e=>{S.mForm.dets[+el.dataset.dsi].si=+e.target.value;render();});
    document.querySelectorAll('[data-dq]').forEach(el=>el.oninput=e=>{S.mForm.dets[+el.dataset.dq].q=+e.target.value;render();});
    document.querySelectorAll('[data-dp]').forEach(el=>el.oninput=e=>{S.mForm.dets[+el.dataset.dp].p=+e.target.value;render();});
    document.querySelectorAll('[data-drem]').forEach(b=>b.onclick=()=>{S.mForm.dets.splice(+b.dataset.drem,1);if(!S.mForm.dets.length)S.mForm.dets.push({si:'',q:1,p:0});render();});
    document.getElementById('addDetBtn')?.onclick=()=>{S.mForm.dets.push({si:'',q:1,p:0});render();};
    document.getElementById('mfCi')?.addEventListener('change',e=>{S.mForm.ci=e.target.value;});
    document.getElementById('mfFe')?.addEventListener('change',e=>{S.mForm.fe=e.target.value;});
    save.onclick=async()=>{
      const f=S.mForm;if(!f.ci||!f.fe||f.dets.some(d=>!d.si))return alert('Completa todos los campos');
      save.textContent='Guardando...';save.disabled=true;
      const periodo=f.fe.substring(0,7);
      const num=`KNX-${String(Date.now()).slice(-6)}`;
      const {data,error}=await API.crearFactura({clienteId:+f.ci,numero:num,tipo:f.tp,fechaEmision:f.fe,periodo,detalles:f.dets});
      if(error){alert('Error: '+JSON.stringify(error));save.textContent='💾 Guardar en BD';save.disabled=false;return;}
      S.fcs=await API.getFacturas(S.per);
      S.modal=null;toast(`✅ Factura ${num} creada para ${ML(periodo)}`);
    };
  }

  // PAGAR
  if(S.modal.tp==='pagar'){
    document.getElementById('pFecha')?.addEventListener('change',e=>{S.pFecha=e.target.value;});
    const fileInput=document.getElementById('compFile');
    const zone=document.getElementById('uploadZone');
    const loadFile=file=>{
      if(!file)return;
      if(file.size>10*1024*1024){alert('Máximo 10 MB');return;}
      S.pCompFile=file;S.pCompName=file.name;
      const r=new FileReader();
      r.onload=ev=>{S.pCompPreview=ev.target.result;render();bindModal();};
      r.readAsDataURL(file);
    };
    if(fileInput) fileInput.onchange=e=>loadFile(e.target.files[0]);
    if(zone){
      zone.ondragover=e=>{e.preventDefault();zone.classList.add('drag');};
      zone.ondragleave=()=>zone.classList.remove('drag');
      zone.ondrop=e=>{e.preventDefault();zone.classList.remove('drag');loadFile(e.dataTransfer.files[0]);};
    }
    document.getElementById('removeComp')?.onclick=()=>{S.pCompFile=null;S.pCompName='';S.pCompPreview=null;render();bindModal();};
    save.onclick=async()=>{
      const fecha=document.getElementById('pFecha')?.value||td();
      save.textContent='Guardando...';save.disabled=true;
      let urlComp=null;
      if(S.pCompFile){
        urlComp=await API.subirComprobante(S.pagarF.numero_factura,S.pCompFile);
      }
      const {error}=await API.marcarPagada(S.pagarF.id,fecha,urlComp);
      if(error){alert('Error al guardar: '+JSON.stringify(error));save.textContent='✅ Confirmar Pago';save.disabled=false;return;}
      S.fcs=await API.getFacturas(S.per);
      S.modal=null;S.pCompPreview=null;
      toast(`✅ Pago registrado${urlComp?' · Comprobante guardado en la nube 🖼️':''}`);
    };
  }

  // CLIENTE
  if(S.modal.tp==='cliente'){
    document.querySelectorAll('[data-cst]').forEach(b=>b.onclick=()=>{S.cForm.st=b.dataset.cst;render();});
    save.onclick=async()=>{
      const n=document.getElementById('cN')?.value||'';if(!n)return;
      const data={n,e:document.getElementById('cE')?.value||'',em:document.getElementById('cEm')?.value||'',tl:document.getElementById('cTl')?.value||'',st:S.cForm.st};
      save.textContent='Guardando...';save.disabled=true;
      if(S.editC) await API.actualizarCliente(S.editC.id,data);
      else await API.crearCliente(data);
      S.cls=await API.getClientes();
      S.modal=null;toast(S.editC?'✅ Cliente actualizado':'✅ Nuevo cliente creado');
    };
  }
}

// ─────────────────────────────────────────────────────────────
// INICIAR
// ─────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>

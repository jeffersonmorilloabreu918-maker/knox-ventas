<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Knox Ventas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"
        onerror="window.Chart=null;"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14;--surf:#0d1525;--surf2:#111d35;--brd:#1a2d50;
  --acc:#00e5ff;--acc2:#7b5fff;--grn:#00c853;--red:#ff1744;--ylw:#ffd740;
  --txt:#e8f0fe;--mut:#607d9f;
}
html,body{min-height:100%;width:100%;overflow-x:hidden;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.025) 1px,transparent 1px);background-size:36px 36px;pointer-events:none;z-index:0;}
#app{position:relative;z-index:1;min-height:100vh;}
/* loading */
.ldf{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;}
.sp{width:44px;height:44px;border:3px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
/* login */
.lp{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.lc{background:var(--surf);border:1px solid var(--brd);border-radius:18px;padding:40px;width:420px;max-width:100%;box-shadow:0 0 60px rgba(0,229,255,.07);}
/* app shell */
.shell{display:flex;min-height:100vh;}
.sb{width:220px;min-width:220px;background:var(--surf);border-right:1px solid var(--brd);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
.logo{padding:20px 20px 16px;border-bottom:1px solid var(--brd);}
.logo-name{font-size:20px;font-weight:800;background:linear-gradient(90deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-by{font-size:9px;color:var(--mut);letter-spacing:1px;margin-top:1px;}
nav{flex:1;padding:8px 0;overflow-y:auto;}
.ni{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;font-size:13px;font-weight:600;color:var(--mut);border-left:3px solid transparent;transition:.15s;user-select:none;}
.ni:hover{color:var(--txt);background:rgba(0,229,255,.04);}
.ni.on{color:var(--acc);background:rgba(0,229,255,.08);border-left-color:var(--acc);}
.ni-i{font-size:15px;width:18px;text-align:center;}
.nbadge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:99px;}
.sbf{padding:14px 20px;border-top:1px solid var(--brd);}
.av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--acc2),var(--acc));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 26px;background:rgba(13,21,37,.92);border-bottom:1px solid var(--brd);backdrop-filter:blur(10px);position:sticky;top:0;z-index:10;flex-wrap:wrap;gap:10px;}
.tb-t{font-size:17px;font-weight:800;}
.tb-s{font-size:11px;color:var(--mut);margin-top:1px;display:flex;align-items:center;gap:5px;}
.pls{width:7px;height:7px;border-radius:50%;background:var(--grn);animation:pls 2s infinite;flex-shrink:0;}
@keyframes pls{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
select.sel{background:var(--surf2);border:1px solid var(--brd);color:var(--txt);padding:7px 12px;border-radius:8px;font-size:12px;cursor:pointer;outline:none;}
.btn{padding:7px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:700;transition:.15s;display:inline-flex;align-items:center;gap:6px;font-family:inherit;}
.bp{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;}
.bp:hover{opacity:.85;}
.bg{background:transparent;border:1px solid var(--brd);color:var(--mut);}
.bg:hover{border-color:var(--acc);color:var(--acc);}
.bsm{padding:5px 12px;font-size:12px;}
.bgrn{background:var(--grn);color:#000;}
.bred{background:var(--red);color:#fff;}
.content{padding:22px 26px;flex:1;}
/* kpi */
.kgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px;}
.kc{background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:16px;position:relative;overflow:hidden;transition:.2s;}
.kc:hover{transform:translateY(-2px);border-color:rgba(0,229,255,.3);}
.kc::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--acc),var(--acc2));opacity:0;transition:.2s;}
.kc:hover::after{opacity:1;}
.kc-i{font-size:20px;margin-bottom:8px;}
.kc-l{font-size:9px;color:var(--mut);letter-spacing:.5px;text-transform:uppercase;}
.kc-v{font-size:20px;font-weight:800;margin:3px 0;letter-spacing:-1px;}
.kc-s{font-size:10px;color:var(--mut);}
/* grid */
.g2{display:grid;grid-template-columns:1.6fr 1fr;gap:14px;margin-bottom:14px;}
.card{background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:18px;}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.ct{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;}
.cdot{width:6px;height:6px;border-radius:50%;}
.cbadge{font-size:10px;padding:3px 8px;border-radius:99px;background:rgba(0,229,255,.1);color:var(--acc);border:1px solid rgba(0,229,255,.2);}
/* table */
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:8px 10px;font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--mut);border-bottom:1px solid var(--brd);}
td{padding:9px 10px;border-bottom:1px solid rgba(26,45,80,.4);vertical-align:middle;}
tr:last-child td{border:none;}
tr:hover td{background:rgba(0,229,255,.02);}
/* chips */
.chip{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700;}
.cg{background:rgba(0,200,83,.15);color:var(--grn);}
.cr{background:rgba(255,23,68,.15);color:var(--red);}
.cy{background:rgba(255,215,64,.15);color:var(--ylw);}
.cb{background:rgba(0,229,255,.15);color:var(--acc);}
.cp{background:rgba(123,95,255,.15);color:var(--acc2);}
/* servicios */
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.si{background:var(--surf2);border:1px solid var(--brd);border-radius:9px;padding:11px;}
.si-n{font-size:9px;color:var(--mut);letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px;}
.si-v{font-size:15px;font-weight:800;}
.si-s{font-size:10px;color:var(--mut);margin-top:1px;}
/* modal */
.mb{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px);}
.mo{background:var(--surf);border:1px solid var(--brd);border-radius:14px;padding:24px;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.6);}
.mo-t{font-size:16px;font-weight:800;margin-bottom:18px;}
.fg{margin-bottom:13px;}
.fl{font-size:10px;font-weight:700;color:var(--mut);letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:5px;}
.fi{width:100%;background:var(--surf2);border:1px solid var(--brd);color:var(--txt);padding:9px 12px;border-radius:7px;font-size:14px;outline:none;transition:.15s;font-family:inherit;}
.fi:focus{border-color:var(--acc);}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fa{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
/* upload */
.uz{border:2px dashed var(--brd);border-radius:10px;padding:22px;text-align:center;cursor:pointer;transition:.2s;position:relative;overflow:hidden;background:var(--surf2);}
.uz:hover,.uz.drag{border-color:var(--acc);background:rgba(0,229,255,.05);}
.uz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
/* comprobante preview */
.cpv{border:1px solid var(--brd);border-radius:10px;overflow:hidden;}
.cpv img{width:100%;max-height:200px;object-fit:contain;background:var(--surf2);display:block;}
.cpvb{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(0,229,255,.06);border-top:1px solid var(--brd);}
.cpvn{font-size:12px;color:var(--acc);font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cpvx{background:none;border:none;color:var(--red);cursor:pointer;font-size:13px;padding:0 0 0 8px;}
.compbtn{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:700;background:rgba(0,229,255,.12);color:var(--acc);cursor:pointer;border:1px solid rgba(0,229,255,.2);}
.compbtn:hover{background:rgba(0,229,255,.25);}
/* lightbox */
.lbox{position:fixed;inset:0;background:rgba(0,0,0,.94);display:flex;align-items:center;justify-content:center;z-index:2000;}
.lbox img{max-width:90vw;max-height:88vh;border-radius:10px;}
.lbox-x{position:fixed;top:16px;right:20px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:18px;cursor:pointer;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;}
/* ranking */
.rr{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid rgba(26,45,80,.3);}
.rr:last-child{border:none;}
.rn{width:26px;height:26px;border-radius:50%;background:var(--surf2);border:1px solid var(--brd);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--mut);flex-shrink:0;}
.rn.top{background:linear-gradient(135deg,var(--acc2),var(--acc));border:none;color:#fff;}
.pb{height:5px;border-radius:99px;background:var(--surf2);flex:1;overflow:hidden;}
.pf{height:100%;border-radius:99px;}
.pred{background:linear-gradient(135deg,rgba(123,95,255,.12),rgba(0,229,255,.08));border:1px solid rgba(123,95,255,.25);border-radius:10px;padding:13px;margin-bottom:9px;}
/* toast */
.toast{position:fixed;bottom:18px;right:18px;z-index:9999;padding:11px 18px;border-radius:9px;font-size:13px;font-weight:700;box-shadow:0 8px 30px rgba(0,0,0,.4);}
/* alert */
.al{border-radius:9px;padding:10px 14px;margin-bottom:12px;font-size:12px;display:flex;align-items:center;gap:8px;}
.aly{background:rgba(255,215,64,.1);border:1px solid rgba(255,215,64,.3);color:var(--ylw);}
.alr{background:rgba(255,23,68,.1);border:1px solid rgba(255,23,68,.3);color:var(--red);}
/* responsive */
@media(max-width:900px){
  .sb{width:50px;min-width:50px;}
  .logo-name,.logo-by,.ni span,.nbadge{display:none;}
  .ni{justify-content:center;}
  .kgrid{grid-template-columns:repeat(2,1fr);}
  .g2{grid-template-columns:1fr;}
  .sg{grid-template-columns:repeat(2,1fr);}
  .content{padding:12px;}
  .topbar{padding:10px 14px;}
}
</style>
</head>
<body>
<div id="app">
  <div class="ldf">
    <div class="sp"></div>
    <div style="color:var(--mut);font-size:13px;">Iniciando Knox Ventas...</div>
  </div>
</div>
<script>
// ─── CLAVES SUPABASE (ya configuradas) ────────────────────────
var SURL = 'https://aivugnevyzoutrvqmrvd.supabase.co';
var SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpdnVnbmV2eXpvdXRydnFtcnZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMjEwMjAsImV4cCI6MjA5MDg5NzAyMH0.0GPAB7-M2wTLHYOllaUT1_hSPgLo63NTQVADrqz-qJw';
// ─────────────────────────────────────────────────────────────

// ── SERVICIOS LOCALES (fallback si BD no tiene) ───────────────
var SVCS_DEFAULT=[
  {id:1,codigo:'GPS_J16',   nombre:'GPS J16',          color:'#00e5ff'},
  {id:2,codigo:'GPS_D11',   nombre:'GPS D11',          color:'#7b5fff'},
  {id:3,codigo:'MARCA_BL',  nombre:'MARCA BLANCA',     color:'#00c853'},
  {id:4,codigo:'NUEVAS_UNI',nombre:'NUEVAS UNIDADES',  color:'#ffd740'},
  {id:5,codigo:'RENOV_UNI', nombre:'RENOV. UNIDADES',  color:'#ff6d00'},
  {id:6,codigo:'RENOV_SIM', nombre:'RENOV. SIM',       color:'#f50057'},
  {id:7,codigo:'NUEVOS_SIM',nombre:'NUEVOS SIM',       color:'#69f0ae'},
  {id:8,codigo:'AUM_DATA',  nombre:'AUMENTO DATA',     color:'#40c4ff'},
  {id:9,codigo:'PLASTIC_S', nombre:'PLASTICO SIM',     color:'#ea80fc'},
];

// ── MESES ─────────────────────────────────────────────────────
var MNOMBRES=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
function ml(k){
  try{var p=k.split('-');return MNOMBRES[parseInt(p[1])]+' '+p[0].slice(2);}
  catch(e){return k;}
}
function td(){return new Date().toISOString().split('T')[0];}
function perActual(){return new Date().toISOString().slice(0,7);}
function periodos(){
  var list=[];var now=new Date();
  for(var i=6;i>=0;i--){
    var d=new Date(now.getFullYear(),now.getMonth()-i,1);
    list.push(d.getFullYear()+'-'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1));
  }
  return list;
}
var fmt=function(n){return 'RD$'+Math.round(n||0).toLocaleString('es-DO');};

// ── HEADERS ───────────────────────────────────────────────────
function sh(){
  var h={'Content-Type':'application/json','apikey':SKEY,'Prefer':'return=representation'};
  if(S.tok) h['Authorization']='Bearer '+S.tok;
  return h;
}

// ── DB ────────────────────────────────────────────────────────
var DB={
  get:function(table,select,filters){
    select=select||'*';filters=filters||{};
    var url=SURL+'/rest/v1/'+table+'?select='+encodeURIComponent(select)+'&limit=500&order=id.desc';
    Object.keys(filters).forEach(function(k){url+='&'+k+'=eq.'+encodeURIComponent(filters[k]);});
    return fetch(url,{headers:sh()}).then(function(r){
      if(!r.ok) return r.text().then(function(t){throw new Error('GET '+table+': '+t);});
      return r.json();
    });
  },
  post:function(table,body){
    return fetch(SURL+'/rest/v1/'+table,{method:'POST',headers:sh(),body:JSON.stringify(body)})
    .then(function(r){
      if(!r.ok) return r.text().then(function(t){throw new Error('POST '+table+': '+t);});
      return r.json().then(function(d){return Array.isArray(d)?d[0]:d;});
    });
  },
  patch:function(table,id,body){
    return fetch(SURL+'/rest/v1/'+table+'?id=eq.'+id,{method:'PATCH',headers:sh(),body:JSON.stringify(body)})
    .then(function(r){
      if(!r.ok) return r.text().then(function(t){throw new Error('PATCH '+table+': '+t);});
      return r.json().then(function(d){return Array.isArray(d)?d[0]:d;});
    });
  },
  del:function(table,id){
    return fetch(SURL+'/rest/v1/'+table+'?id=eq.'+id,{method:'DELETE',headers:sh()})
    .then(function(r){if(!r.ok) return r.text().then(function(t){throw new Error('DELETE '+table+': '+t);});});
  },
  login:function(email,pass){
    return fetch(SURL+'/auth/v1/token?grant_type=password',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SKEY},
      body:JSON.stringify({email:email,password:pass})
    }).then(function(r){return r.json();});
  },
  upload:function(path,file){
    return fetch(SURL+'/storage/v1/object/comprobantes/'+path,{
      method:'POST',
      headers:{'apikey':SKEY,'Authorization':'Bearer '+S.tok,'Content-Type':file.type},
      body:file
    }).then(function(r){
      if(!r.ok) return null;
      return SURL+'/storage/v1/object/public/comprobantes/'+path;
    }).catch(function(){return null;});
  }
};

// ── STATE ─────────────────────────────────────────────────────
var S={
  tok:null,user:null,
  sec:'dash',per:perActual(),
  cls:[],fcs:[],svcs:[],
  modal:null,toast:null,
  mFiltro:'todas',cFiltro:'todos',
  mForm:{ci:'',tp:'Mensual',fe:td(),dets:[{si:'',q:1,p:0}]},
  cForm:{n:'',e:'',em:'',tl:'',st:'Activo'},
  editC:null,pagarF:null,
  pFecha:td(),pFile:null,pFileName:'',pPreview:null,
  lbox:null,
};

// ── RENDER ────────────────────────────────────────────────────
function R(){
  var app=document.getElementById('app');
  if(!app){console.error('No #app');return;}
  try{
    if(!S.user){app.innerHTML=rLogin();bLogin();return;}
    app.innerHTML=rApp();
    bApp();
    if(S.sec==='dash') setTimeout(initCharts,80);
    if(S.toast){
      clearTimeout(window._tt);
      window._tt=setTimeout(function(){S.toast=null;R();},3000);
    }
  }catch(e){
    console.error('Render error:',e);
    app.innerHTML='<div class="ldf"><div style="font-size:36px">⚠️</div><div style="color:var(--red);font-weight:700;font-size:15px;">Error: '+e.message+'</div><button onclick="location.reload()" class="btn bp" style="margin-top:14px;">🔄 Recargar</button></div>';
  }
}

// ── LOGIN ─────────────────────────────────────────────────────
function rLogin(){
  return '<div class="lp"><div class="lc">'+
  '<div style="text-align:center;margin-bottom:26px;">'+
  '<div style="font-size:26px;font-weight:800;background:linear-gradient(90deg,#00e5ff,#7b5fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Knox Ventas</div>'+
  '<div style="font-size:10px;color:var(--mut);letter-spacing:2px;margin-top:3px;">GPS MONITORING SYSTEM</div>'+
  '<div style="font-size:10px;color:var(--mut);margin-top:2px;">by Jefferson Morillo</div></div>'+
  '<div id="lerr"></div>'+
  '<div class="fg"><label class="fl">EMAIL</label><input class="fi" id="lem" type="email" placeholder="tu@email.com" autocomplete="email"></div>'+
  '<div class="fg"><label class="fl">CONTRASEÑA</label><input class="fi" id="lps" type="password" placeholder="••••••••" autocomplete="current-password"></div>'+
  '<button class="btn bp" id="lbtn" style="width:100%;justify-content:center;padding:12px;">Iniciar Sesión</button>'+
  '<div style="margin-top:12px;font-size:11px;color:var(--mut);text-align:center;">Usa el email y contraseña de Supabase → Authentication → Users</div>'+
  '</div></div>';
}

function bLogin(){
  var go=function(){
    var em=document.getElementById('lem').value.trim();
    var ps=document.getElementById('lps').value;
    var errEl=document.getElementById('lerr');
    var btn=document.getElementById('lbtn');
    if(!em||!ps){errEl.innerHTML='<div class="al alr">⚠️ Ingresa email y contraseña</div>';return;}
    btn.textContent='Verificando...';btn.disabled=true;errEl.innerHTML='';
    DB.login(em,ps).then(function(res){
      if(res&&res.access_token){
        S.tok=res.access_token;
        S.user={n:(res.user&&res.user.email?res.user.email.split('@')[0]:'Admin'),r:'Admin',em:em};
        cargar().then(R);
      }else{
        var msg=(res&&(res.error_description||res.error))||'Credenciales incorrectas';
        errEl.innerHTML='<div class="al alr">⚠️ '+msg+'</div>';
        btn.textContent='🔐 Iniciar Sesión';btn.disabled=false;
      }
    }).catch(function(e){
      errEl.innerHTML='<div class="al alr">⚠️ Error de red: '+e.message+'</div>';
      btn.textContent='🔐 Iniciar Sesión';btn.disabled=false;
    });
  };
  var btn=document.getElementById('lbtn');
  var ps=document.getElementById('lps');
  if(btn) btn.onclick=go;
  if(ps) ps.onkeydown=function(e){if(e.key==='Enter')go();};
}

function cargar(){
  return Promise.all([
    DB.get('clientes').then(function(d){S.cls=d||[];}).catch(function(){S.cls=[];}),
    DB.get('servicios').then(function(d){S.svcs=d&&d.length?d:SVCS_DEFAULT;}).catch(function(){S.svcs=SVCS_DEFAULT;}),
    DB.get('facturas','*,clientes(nombre,empresa)',{periodo_servicio:S.per}).then(function(d){S.fcs=d||[];}).catch(function(){S.fcs=[];})
  ]);
}

// ── APP SHELL ─────────────────────────────────────────────────
function rApp(){
  var pend=S.fcs.filter(function(f){return f.estado==='Pendiente';}).length;
  var nav=[
    {id:'dash',i:'📊',l:'Dashboard'},
    {id:'facs',i:'🧾',l:'Facturas',b:pend||null},
    {id:'cls', i:'👥',l:'Clientes'},
    {id:'mor', i:'⚠️',l:'Morosidad'},
    {id:'rank',i:'🏆',l:'Ranking'},
  ];
  var titles={dash:'📊 Dashboard',facs:'🧾 Facturas',cls:'👥 Clientes',mor:'⚠️ Morosidad',rank:'🏆 Ranking'};
  var cont={dash:rDash(),facs:rFacs(),cls:rCls(),mor:rMor(),rank:rRank()};

// ── DASHBOARD ─────────────────────────────────────────────────
function calcK(){
  var f=S.fcs;
  var cm={};S.cls.forEach(function(c){cm[c.id]=c;});
  var tot=f.reduce(function(s,x){return s+(parseFloat(x.total)||0);},0);
  var pag=f.filter(function(x){return x.estado==='Pagada';}).length;
  var cob=f.filter(function(x){return x.estado==='Pagada';}).reduce(function(s,x){return s+(parseFloat(x.total)||0);},0);
  var pct=f.length?Math.round(pag*100/f.length):0;
  var act=f.filter(function(x){var c=cm[x.cliente_id];return c&&c.estado==='Activo';});
  var pA=act.filter(function(x){return x.estado==='Pendiente';}).length;
  var mor=act.length?Math.round(pA*100/act.length):0;
  var nm=S.cls.filter(function(c){return !c.es_general&&c.creado_en&&c.creado_en.substring(0,7)===S.per;}).length;
  return{tot:tot,cob:cob,pend:tot-cob,pct:pct,mor:mor,nm:nm,totF:f.length,pag:pag};
}

function rDash(){
  var k=calcK();
  var svcs=S.svcs.length?S.svcs:SVCS_DEFAULT;
  return rKpis(k)+
  '<div class="g2">'+
  '<div class="card"><div class="ch"><div class="ct"><div class="cdot" style="background:var(--acc)"></div>Resumen '+ml(S.per)+'</div><span class="cbadge">'+k.totF+' facturas</span></div><div style="position:relative;height:190px;"><canvas id="cbar"></canvas></div></div>'+
  '<div class="card"><div class="ch"><div class="ct"><div class="cdot" style="background:var(--grn)"></div>Estado</div></div>'+
  '<div style="position:relative;height:160px;"><canvas id="cdon"></canvas></div>'+
  '<div style="display:flex;justify-content:center;gap:18px;margin-top:8px;">'+
  '<div style="text-align:center;"><div style="font-size:17px;font-weight:800;color:var(--grn);">'+k.pag+'</div><div style="font-size:10px;color:var(--mut);">Pagadas</div></div>'+
  '<div style="text-align:center;"><div style="font-size:17px;font-weight:800;color:var(--red);">'+(k.totF-k.pag)+'</div><div style="font-size:10px;color:var(--mut);">Pendientes</div></div>'+
  '</div></div></div>'+
  '<div class="card"><div class="ch"><div class="ct"><div class="cdot" style="background:var(--ylw)"></div>Servicios — '+ml(S.per)+'</div></div>'+
  '<div class="sg">'+svcs.map(function(s){
    var col=SVCS_DEFAULT.find(function(x){return x.codigo===s.codigo;});
    return '<div class="si"><div class="si-n">'+s.nombre+'</div><div class="si-v" style="color:'+(col?col.color:'#fff')+'">RD$0</div><div class="si-s">0 unidades</div></div>';
  }).join('')+'</div></div>';
}

function rKpis(k){
  return '<div class="kgrid">'+
  kc('💰','Total Facturado',fmt(k.tot),k.totF+' facturas','#00e5ff')+
  kc('✅','Cobrado',fmt(k.cob),k.pag+' pagadas','#00c853')+
  kc('⏳','Por Cobrar',fmt(k.pend),(k.totF-k.pag)+' pendientes','#ffd740')+
  kc('📊','% Pago',k.pct+'%','fecha emisión',k.pct>=75?'#00c853':k.pct>=50?'#ffd740':'#ff1744')+
  kc('🔥','Nuevos Masters',k.nm,ml(S.per),'#7b5fff')+
  '</div>';
}
function kc(i,l,v,s,c){
  return '<div class="kc"><div class="kc-i">'+i+'</div><div class="kc-l">'+l+'</div><div class="kc-v" style="color:'+c+'">'+v+'</div><div class="kc-s">'+s+'</div></div>';
}

// ── FACTURAS ──────────────────────────────────────────────────

  '<div style="flex:1;"></div>'+

    var comp=fc.url_comprobante?'<button class="compbtn" data-lb="'+fc.url_comprobante+'">🖼️ Ver</button>':'<span style="font-size:11px;color:var(--mut);">—</span>';
    return '<tr>'+
    '<td><span style="font-family:monospace;font-size:11px;color:var(--acc);">'+fc.numero_factura+'</span></td>'+
    '<td><div style="font-weight:700;">'+(cl.nombre||'—')+'</div><div style="font-size:11px;color:var(--mut);">'+(cl.empresa||'')+'</div></td>'+
    '<td><span class="chip '+(fc.tipo_factura==='Mensual'?'cb':'cp')+'">'+(fc.tipo_factura==='Mensual'?'🔁 Mensual':'⚡ Directa')+'</span></td>'+

    '<td><span class="chip cb" style="font-size:10px;">'+fc.periodo_servicio+'</span></td>'+
    '<td><span style="font-weight:800;color:var(--acc);">'+fmt(fc.total)+'</span></td>'+
    '<td><span class="chip '+(fc.estado==='Pagada'?'cg':'cy')+'">'+(fc.estado==='Pagada'?'✅ Pagada':'⏳ Pendiente')+'</span>'+(fc.fecha_pago?'<div style="font-size:10px;color:var(--mut);margin-top:2px;">Pago: '+fc.fecha_pago+'</div>':'')+'</td>'+
    '<td>'+comp+'</td>'+

// ── CLIENTES ──────────────────────────────────────────────────
function rCls(){
  var deuda=function(id){return S.fcs.filter(function(f){return f.cliente_id===id&&f.estado==='Pendiente';}).reduce(function(s,f){return s+(parseFloat(f.total)||0);},0);};
  var cl=S.cls.filter(function(c){return !c.es_general;});
  if(S.cFiltro!=='todos') cl=cl.filter(function(c){return c.estado===S.cFiltro;});
  var bts='<div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;">'+
  '<button class="btn bp bsm" id="btnNC">👤 Nuevo Cliente</button><div style="flex:1;"></div>'+
  ['todos','Activo','Suspendido'].map(function(s){return '<button class="btn bsm '+(S.cFiltro===s?'bp':'bg')+'" data-cf="'+s+'">'+(s==='todos'?'👥 Todos':s==='Activo'?'✅ Activos':'🚫 Suspendidos')+'</button>';}).join('')+'</div>';
  var vacio='<tr><td colspan="8" style="text-align:center;color:var(--mut);padding:26px;">Sin clientes — crea el primero con el botón de arriba</td></tr>';
  var filas=cl.length===0?vacio:cl.map(function(c){
    var d=deuda(c.id);
    return '<tr>'+
    '<td style="font-weight:700;">'+c.nombre+'</td><td>'+(c.empresa||'—')+'</td>'+
    '<td style="font-size:12px;color:var(--mut);">'+(c.email||'—')+'</td>'+
    '<td style="font-family:monospace;font-size:12px;">'+(c.telefono||'—')+'</td>'+
    '<td><span class="chip '+(c.estado==='Activo'?'cg':'cr')+'">'+(c.estado==='Activo'?'✅ Activo':'🚫 Suspendido')+'</span></td>'+
    '<td>'+(d>0?'<span style="font-weight:800;color:'+(c.estado==='Suspendido'?'var(--mut)':'var(--red)')+';">'+fmt(d)+'</span>':'<span style="color:var(--grn);font-weight:600;">Sin deuda</span>')+'</td>'+
    '<td style="font-family:monospace;font-size:11px;color:var(--mut);">'+(c.creado_en||'').substring(0,10)+'</td>'+
    '<td><div style="display:flex;gap:5px;"><button class="btn bg bsm" data-edit="'+c.id+'">✏️</button><button class="btn bg bsm" data-del="'+c.id+'" style="color:var(--red);">🗑️</button></div></td>'+
    '</tr>';
  }).join('');
  return bts+'<div class="card" style="overflow-x:auto;"><table><thead><tr>'+
  ['Cliente','Empresa','Email','Teléfono','Estado','Deuda','Creado',''].map(function(h){return '<th>'+h+'</th>';}).join('')+
  '</tr></thead><tbody>'+filas+'</tbody></table></div>';
}

// ── MOROSIDAD ─────────────────────────────────────────────────
function rMor(){
  var cm={};S.cls.forEach(function(c){cm[c.id]=c;});
  var mor={};
  S.fcs.filter(function(f){return f.estado==='Pendiente';}).forEach(function(f){
    var c=cm[f.cliente_id];if(!c||c.estado!=='Activo'||c.es_general)return;
    if(!mor[f.cliente_id])mor[f.cliente_id]={c:c,fcs:[],tot:0};
    mor[f.cliente_id].fcs.push(f);mor[f.cliente_id].tot+=parseFloat(f.total)||0;
  });
  var mkeys=Object.keys(mor);
  var susp=S.cls.filter(function(c){return c.estado==='Suspendido'&&!c.es_general;});
  var ds=function(id){return S.fcs.filter(function(f){return f.cliente_id===id&&f.estado==='Pendiente';}).reduce(function(s,f){return s+(parseFloat(f.total)||0);},0);};
  var mRows=mkeys.length===0?'<tr><td colspan="5" style="text-align:center;color:var(--grn);font-weight:700;padding:22px;">🎉 Sin morosidad en este período</td></tr>':
  mkeys.map(function(k){var m=mor[k];return '<tr><td style="font-weight:700;">'+m.c.nombre+'</td><td>'+(m.c.empresa||'—')+'</td><td><span class="chip cy">'+m.fcs.length+'</span></td><td><span style="font-weight:800;color:var(--red);">'+fmt(m.tot)+'</span></td><td><span class="chip '+(m.tot>10000?'cr':m.tot>5000?'cy':'cb')+'">'+(m.tot>10000?'🔴 Alto':m.tot>5000?'🟡 Medio':'🟢 Bajo')+'</span></td></tr>';}).join('');
  var sRows=susp.length===0?'<tr><td colspan="4" style="text-align:center;color:var(--mut);padding:14px;">Sin clientes suspendidos</td></tr>':
  susp.map(function(c){return '<tr><td>'+c.nombre+'</td><td>'+(c.empresa||'—')+'</td><td style="font-weight:700;color:var(--mut);">'+fmt(ds(c.id))+'</td><td><span class="chip cr">🚫</span></td></tr>';}).join('');
  return '<div class="card" style="margin-bottom:14px;">'+
  '<div class="ch"><div class="ct"><div class="cdot" style="background:var(--red)"></div>⚠️ Morosos — '+ml(S.per)+'</div><span class="chip cr">'+mkeys.length+'</span></div>'+
  '<table><thead><tr>'+['Cliente','Empresa','Pendientes','Deuda','Riesgo'].map(function(h){return '<th>'+h+'</th>';}).join('')+'</tr></thead><tbody>'+mRows+'</tbody></table></div>'+
  '<div class="card"><div class="ch"><div class="ct"><div class="cdot" style="background:var(--mut)"></div>🚫 Suspendidos con Deuda</div></div>'+
  '<div class="al aly">⚠️ No afectan métricas de morosidad (regla contable)</div>'+
  '<table><thead><tr>'+['Cliente','Empresa','Deuda','Estado'].map(function(h){return '<th>'+h+'</th>';}).join('')+'</tr></thead><tbody>'+sRows+'</tbody></table></div>';
}

// ── RANKING ───────────────────────────────────────────────────
function rRank(){
  var ranking=S.cls.filter(function(c){return !c.es_general;}).map(function(c){
    var ff=S.fcs.filter(function(f){return f.cliente_id===c.id;});
    var tot=ff.reduce(function(s,f){return s+(parseFloat(f.total)||0);},0);
    var pag=ff.filter(function(f){return f.estado==='Pagada';}).reduce(function(s,f){return s+(parseFloat(f.total)||0);},0);
    var pct=tot>0?Math.round(pag*100/tot):0;
    return{c:c,tot:tot,pag:pag,pct:pct};
  }).sort(function(a,b){return b.pct-a.pct;});
  var rItems=ranking.length===0?'<div style="text-align:center;padding:22px;color:var(--mut);">Sin datos todavía</div>':
  ranking.map(function(r,i){
    var col=r.pct>=80?'var(--grn)':r.pct>=50?'var(--ylw)':'var(--red)';
    return '<div class="rr"><div class="rn'+(i<3?' top':'')+'">'+( i+1)+'</div>'+
    '<div style="flex:1;min-width:0;"><div style="font-weight:700;font-size:13px;">'+r.c.nombre+'</div>'+
    '<div style="font-size:11px;color:var(--mut);">'+(r.c.empresa||'')+'</div>'+
    '<div style="display:flex;align-items:center;gap:8px;margin-top:4px;"><div class="pb"><div class="pf" style="width:'+r.pct+'%;background:'+col+';"></div></div>'+
    '<span style="font-size:11px;font-weight:700;color:'+col+';">'+r.pct+'%</span></div></div>'+
    '<div style="text-align:right;"><div style="font-weight:800;font-size:13px;color:var(--acc);">'+fmt(r.pag)+'</div>'+
    '<div style="font-size:10px;color:var(--mut);">de '+fmt(r.tot)+'</div></div></div>';
  }).join('');
  var ia=ranking.filter(function(r){return r.pct<60;});
  var iaHtml=ia.length===0?'<div style="text-align:center;padding:22px;color:var(--grn);font-weight:700;">✨ Todos con buen historial</div>':
  ia.map(function(r){
    return '<div class="pred"><div style="display:flex;justify-content:space-between;align-items:center;">'+
    '<div><div style="font-weight:700;font-size:13px;">'+r.c.nombre+'</div><div style="font-size:11px;color:var(--mut);">'+(r.c.empresa||'')+'</div></div>'+
    '<span class="chip cr">'+r.pct+'%</span></div>'+
    '<div style="font-size:12px;color:var(--mut);margin-top:7px;">'+(r.pct<30?'🔴 Alto riesgo — seguimiento urgente':r.pct<50?'🟡 Riesgo moderado':'🔵 Riesgo leve')+'</div></div>';
  }).join('');
  return '<div class="g2">'+
  '<div class="card"><div class="ch"><div class="ct">🏆 Ranking de Clientes</div></div>'+rItems+'</div>'+
  '<div class="card"><div class="ch"><div class="ct">🤖 Predicción IA</div></div>'+iaHtml+'</div></div>';
}

  '<div class="uz" id="uzn"><input type="file" id="cmpFile" accept="image/png,image/jpeg,image/jpg,image/webp,application/pdf"><span style="font-size:26px;display:block;margin-bottom:7px;">📷</span><div style="font-size:13px;color:var(--mut);"><b style="color:var(--acc);">Clic aquí</b> o arrastra la imagen</div><div style="font-size:11px;color:var(--mut);margin-top:3px;">PNG · JPG · PDF · máx 10MB</div></div>')+
  '</div>'+
  '<div class="al aly">⚠️ El período <b>'+f.periodo_servicio+'</b> no cambia (regla contable de fecha emisión)</div>'+
  '<div class="fa"><button class="btn bg" id="moCan">Cancelar</button><button class="btn bgrn" id="moSave" style="min-width:150px;">✅ Confirmar Pago</button></div>'+
  '</div></div>';
}

  '<div class="fg"><label class="fl">TELÉFONO</label><input class="fi" id="cTl" value="'+(f.tl||'')+'" placeholder="809-..."></div></div>'+
  '<div class="fg"><label class="fl">ESTADO</label><div style="display:flex;gap:8px;">'+

  '<button class="btn bsm '+(f.st==='Suspendido'?'bred':'bg')+'" data-cst="Suspendido" style="flex:1;">🚫 Suspendido</button>'+
  '</div></div>'+
  '<div class="fa"><button class="btn bg" id="moCan">Cancelar</button><button class="btn bp" id="moSave">💾 Guardar</button></div>'+

// ── CHARTS ────────────────────────────────────────────────────
function initCharts(){
  if(!window.Chart) return;
  ['cbar','cdon'].forEach(function(id){
    var el=document.getElementById(id);
    if(el){var i=Chart.getChart(el);if(i)i.destroy();}
  });
  var k=calcK();
  var cbar=document.getElementById('cbar');
  if(cbar) new Chart(cbar,{type:'bar',
    data:{labels:['Facturado','Cobrado','Pendiente'],datasets:[{
      data:[k.tot,k.cob,k.pend],
      backgroundColor:['rgba(0,229,255,.7)','rgba(0,200,83,.7)','rgba(255,215,64,.7)'],
      borderRadius:6,barThickness:50
    }]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
      tooltip:{callbacks:{label:function(c){return 'RD$'+Math.round(c.parsed.y).toLocaleString();}}}},
      scales:{x:{grid:{color:'rgba(26,45,80,.4)'},ticks:{color:'#607d9f',font:{size:12}}},
              y:{grid:{color:'rgba(26,45,80,.4)'},ticks:{color:'#607d9f',font:{size:10},callback:function(v){return 'RD$'+v.toLocaleString();}}}}}});
  var cdon=document.getElementById('cdon');
  if(cdon) new Chart(cdon,{type:'doughnut',
    data:{labels:['Pagadas','Pendientes'],datasets:[{
      data:[k.pag||0,(k.totF-k.pag)||0],
      backgroundColor:['#00c853','#ff1744'],borderWidth:0,hoverOffset:4
    }]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{display:false}}}});
}

// ── BINDINGS ──────────────────────────────────────────────────
function bApp(){
  // nav
  document.querySelectorAll('.ni').forEach(function(el){
    el.onclick=function(){S.sec=el.dataset.sec;R();};
  });
  // periodo
  var psel=document.getElementById('psel');
  if(psel) psel.onchange=function(){
    S.per=psel.value;
    DB.get('facturas','*,clientes(nombre,empresa)',{periodo_servicio:S.per}).then(function(d){S.fcs=d||[];R();}).catch(function(){R();});
  };
  // salir
  var bo=document.getElementById('btnOut');
  if(bo) bo.onclick=function(){S.tok=null;S.user=null;S.cls=[];S.fcs=[];S.svcs=[];R();};
  // filtros
  document.querySelectorAll('[data-filtro]').forEach(function(b){b.onclick=function(){S.mFiltro=b.dataset.filtro;R();};});
  document.querySelectorAll('[data-cf]').forEach(function(b){b.onclick=function(){S.cFiltro=b.dataset.cf;R();};});
  // nueva factura
  var bnm=document.getElementById('btnNM');if(bnm) bnm.onclick=function(){S.modal={tp:'fac'};S.mForm={ci:'',tp:'Mensual',fe:td(),dets:[{si:'',q:1,p:0}]};R();};
  var bnd=document.getElementById('btnND');if(bnd) bnd.onclick=function(){S.modal={tp:'fac'};S.mForm={ci:'',tp:'Directa',fe:td(),dets:[{si:'',q:1,p:0}]};R();};
  // pagar
  document.querySelectorAll('[data-pagar]').forEach(function(b){
    b.onclick=function(){
      S.pagarF=S.fcs.find(function(f){return f.id===+b.dataset.pagar;});
      S.pFecha=td();S.pFile=null;S.pFileName='';S.pPreview=null;
      S.modal={tp:'pag'};R();
    };
  });
  // lightbox
  document.querySelectorAll('[data-lb]').forEach(function(b){b.onclick=function(){S.lbox=b.dataset.lb;R();};});
  var lboxEl=document.getElementById('lboxEl');
  if(lboxEl){
    lboxEl.onclick=function(e){if(e.target===lboxEl||e.target.tagName==='IMG'){S.lbox=null;R();}};
    var lboxX=document.getElementById('lboxX');if(lboxX) lboxX.onclick=function(){S.lbox=null;R();};
  }
  // clientes
  var bnc=document.getElementById('btnNC');if(bnc) bnc.onclick=function(){S.editC=null;S.cForm={n:'',e:'',em:'',tl:'',st:'Activo'};S.modal={tp:'cli'};R();};
  document.querySelectorAll('[data-edit]').forEach(function(b){
    b.onclick=function(){
      var c=S.cls.find(function(x){return x.id===+b.dataset.edit;});
      S.editC=c;S.cForm={n:c.nombre,e:c.empresa||'',em:c.email||'',tl:c.telefono||'',st:c.estado};
      S.modal={tp:'cli'};R();
    };
  });
  document.querySelectorAll('[data-del]').forEach(function(b){
    b.onclick=function(){
      if(!confirm('¿Eliminar este cliente?'))return;
      DB.del('clientes',+b.dataset.del).then(function(){
        return DB.get('clientes');
      }).then(function(d){S.cls=d||[];S.toast={m:'🗑️ Cliente eliminado',c:'var(--ylw)'};R();}).catch(function(e){alert('Error: '+e.message);});
    };
  });
  bModal();
}

function bModal(){
  var mbg=document.getElementById('mbg');
  if(mbg) mbg.onclick=function(e){if(e.target===mbg){S.modal=null;S.pPreview=null;R();}};
  var can=document.getElementById('moCan');if(can) can.onclick=function(){S.modal=null;S.pPreview=null;R();};
  var save=document.getElementById('moSave');if(!save||!S.modal)return;

  // FACTURA
  if(S.modal.tp==='fac'){
    document.querySelectorAll('[data-ftp]').forEach(function(b){b.onclick=function(){S.mForm.tp=b.dataset.ftp;R();};});
    document.querySelectorAll('[data-dsi]').forEach(function(el){el.onchange=function(){S.mForm.dets[+el.dataset.dsi].si=+el.value;R();};});
    document.querySelectorAll('[data-dq]').forEach(function(el){el.oninput=function(){S.mForm.dets[+el.dataset.dq].q=+el.value;R();};});
    document.querySelectorAll('[data-dp]').forEach(function(el){el.oninput=function(){S.mForm.dets[+el.dataset.dp].p=+el.value;R();};});
    document.querySelectorAll('[data-drem]').forEach(function(b){b.onclick=function(){S.mForm.dets.splice(+b.dataset.drem,1);if(!S.mForm.dets.length)S.mForm.dets.push({si:'',q:1,p:0});R();};});
    var ad=document.getElementById('addDet');if(ad) ad.onclick=function(){S.mForm.dets.push({si:'',q:1,p:0});R();};
    var mfCi=document.getElementById('mfCi');if(mfCi) mfCi.onchange=function(){S.mForm.ci=mfCi.value;};
    var mfFe=document.getElementById('mfFe');if(mfFe) mfFe.onchange=function(){S.mForm.fe=mfFe.value;};
    save.onclick=function(){
      var f=S.mForm;
      if(!f.ci||!f.fe){alert('Selecciona cliente y fecha');return;}
      if(f.dets.some(function(d){return !d.si;})){alert('Selecciona el servicio en cada línea');return;}
      save.textContent='Guardando...';save.disabled=true;
      var periodo=f.fe.substring(0,7);
      var num='KNX-'+Date.now().toString().slice(-6);
      DB.post('facturas',{cliente_id:+f.ci,numero_factura:num,tipo_factura:f.tp,fecha_emision:f.fe,periodo_servicio:periodo,estado:'Pendiente',total:0})
      .then(function(fac){
        var proms=f.dets.map(function(d){return DB.post('factura_detalles',{factura_id:fac.id,servicio_id:+d.si,cantidad:+d.q,precio_unitario:+d.p});});
        return Promise.all(proms);
      }).then(function(){
        return DB.get('facturas','*,clientes(nombre,empresa)',{periodo_servicio:S.per});
      }).then(function(d){
        S.fcs=d||[];S.modal=null;S.toast={m:'✅ Factura '+num+' guardada',c:'var(--grn)'};R();
      }).catch(function(e){alert('Error: '+e.message);save.textContent='💾 Guardar';save.disabled=false;});
    };
  }

  // PAGAR
  if(S.modal.tp==='pag'){
    var pFe=document.getElementById('pFe');if(pFe) pFe.onchange=function(){S.pFecha=pFe.value;};
    var loadF=function(file){
      if(!file)return;
      if(file.size>10*1024*1024){alert('Máximo 10MB');return;}
      S.pFile=file;S.pFileName=file.name;
      var reader=new FileReader();
      reader.onload=function(e){S.pPreview=e.target.result;R();bModal();};
      reader.readAsDataURL(file);
    };
    var cfi=document.getElementById('cmpFile');if(cfi) cfi.onchange=function(){loadF(cfi.files[0]);};
    var uzn=document.getElementById('uzn');
    if(uzn){
      uzn.ondragover=function(e){e.preventDefault();uzn.classList.add('drag');};
      uzn.ondragleave=function(){uzn.classList.remove('drag');};
      uzn.ondrop=function(e){e.preventDefault();uzn.classList.remove('drag');loadF(e.dataTransfer.files[0]);};
    }
    var rc=document.getElementById('remComp');if(rc) rc.onclick=function(){S.pFile=null;S.pFileName='';S.pPreview=null;R();bModal();};
    save.onclick=function(){
      var fecha=document.getElementById('pFe')?document.getElementById('pFe').value:td();
      save.textContent='Guardando...';save.disabled=true;
      var doUpdate=function(urlComp){
        DB.patch('facturas',S.pagarF.id,{estado:'Pagada',fecha_pago:fecha,url_comprobante:urlComp,actualizado_en:new Date().toISOString()})
        .then(function(){return DB.get('facturas','*,clientes(nombre,empresa)',{periodo_servicio:S.per});})
        .then(function(d){
          S.fcs=d||[];S.modal=null;S.pPreview=null;
          S.toast={m:'✅ Pago registrado'+(urlComp?' · Comprobante guardado 🖼️':''),c:'var(--grn)'};R();
        }).catch(function(e){alert('Error: '+e.message);save.textContent='✅ Confirmar Pago';save.disabled=false;});
      };
      if(S.pFile){
        var ext=S.pFile.name.split('.').pop();
        var path=S.pagarF.numero_factura+'_'+Date.now()+'.'+ext;
        DB.upload(path,S.pFile).then(doUpdate).catch(function(){doUpdate(null);});
      }else{doUpdate(null);}
    };
  }

  // CLIENTE
  if(S.modal.tp==='cli'){
    document.querySelectorAll('[data-cst]').forEach(function(b){b.onclick=function(){S.cForm.st=b.dataset.cst;R();};});
    save.onclick=function(){
      var n=document.getElementById('cN')?document.getElementById('cN').value.trim():'';
      if(!n){alert('El nombre es obligatorio');return;}
      save.textContent='Guardando...';save.disabled=true;
      var body={nombre:n,empresa:document.getElementById('cE').value||null,email:document.getElementById('cEm').value||null,telefono:document.getElementById('cTl').value||null,estado:S.cForm.st};
      var prom=S.editC?DB.patch('clientes',S.editC.id,body):DB.post('clientes',body);
      prom.then(function(){return DB.get('clientes');}).then(function(d){
        S.cls=d||[];S.modal=null;
        S.toast={m:S.editC?'✅ Cliente actualizado':'✅ Cliente creado',c:'var(--grn)'};R();
      }).catch(function(e){alert('Error: '+e.message);save.textContent='💾 Guardar';save.disabled=false;});
    };
  }
}

// ── INICIO ────────────────────────────────────────────────────
window.onload=function(){R();};
